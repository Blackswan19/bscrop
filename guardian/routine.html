<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BsGuardian</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #02153d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .daily-routine-section {
            margin: 20px;
            padding: 20px;
            background: #ffffff17;
            border: solid 1.5px gray;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px; /* Set a width for the daily routine section */
        }

        .routine-item {
            margin: 5px 0;
            padding: 10px;
            /* background-color: #f9f9f9; */
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 600;
        }

        .routine-item:last-child {
            border-bottom: none;
        }

        .btn-add {
            background-color: #ffffff21;
            color: white;
            padding: 8px 34px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-add:hover {
            background-color: #0041ff;
        }

        .btn-remove {
            background-color: #ff4c4c;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .btn-remove:hover {
            background-color: #ff1a1a;
        }

        input[type="text"] {
            padding: 10px 45px;
    border-radius: 5px;
    border: 1px solid #ccc;
    margin-right: 10px;
    font-size: 15px;
    width: auto;
    transition: border-color 0.3s ease;
    margin-bottom: 20px;
    color: black;
    font-weight: 500;
    outline: none;

        }

        input[type="time"] {
            padding: 9px 20px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            color: black;
        }

        h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div class="daily-routine-section">
        <h2>My Daily Routine</h2>
        <input type="text" id="routineInput" placeholder="Enter your routine(e.g., 8 am - wake up)">
        <input type="time" id="routineTime" value="08:00"><br>
        <button class="btn-add" id="addButton">Add</button>
        <div id="routineList"></div>
        <button onclick="window.location.href='checkin.html'" style="background: #000000;
        padding: 10px;
        border: none;
        border-radius: 4px;color: white;">Go to Check-in Page</button>
    </div>

    <script src="routine.js">
        
    </script>

</body>
</html>
