<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BsGuardian</title>
    <script src="routine.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@300;600&display=swap');

        * {
            color: rgb(255, 255, 255);
            font-family: "Red Hat Display", sans-serif;
            letter-spacing: 0.5px;
        }

        body {
            background-color: #37474F;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .goal-section {
            margin: 20px;
            padding: 20px;
            background: #ffffff30;
            border: solid 1.5px gray;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px; /* Set a width for the goal section */
        }

        .goal-item {
            margin: 5px 0;
            padding: 10px;
            /* background-color: #f9f9f9; */
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
    font-weight: 600;
        }

        .goal-item:last-child {
            border-bottom: none;
        }

        .btn-start {
            background-color: #ffffff21;
            color: white;
            padding: 10px 34px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-start:hover {
            background-color: #bfbfbf;
        }

        .btn-delete {
            background-color: #ff4c4c;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .btn-delete:hover {
            background-color: #ff1a1a;
        }

        input[type="text"] {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-right: 10px;
            font-size: 16px;
            width: 85%; /* Set a width for the input field */
            transition: border-color 0.3s ease;
            margin-bottom: 20px;
            color: black;
            font-weight: 500;
        }

        input[type="time"] {
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            color: black;
        }

        h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div class="goal-section">
        <h2>Daily routine</h2>
        <input type="text" id="goalInput" placeholder="Enter your routine(e.g., 8 am - wake up)">
        <input type="time" id="goalTime" value="12:00">
        <button class="btn-start" id="startButton">SAVE</button>
        <div id="goalList"></div>
    </div>
</body>
</html>
