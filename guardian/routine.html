<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDailyTracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@300;600&display=swap');

        * {
            color: rgb(255, 255, 255);
            font-family: "Red Hat Display", sans-serif;
            letter-spacing: 0.5px;
        }

        body {
            background-color: #37474F;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .daily-routine-section {
            margin: 20px;
            padding: 20px;
            background: #ffffff30;
            border: solid 1.5px gray;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px; /* Set a width for the daily routine section */
        }

        .routine-item {
            margin: 5px 0;
            padding: 10px;
            /* background-color: #f9f9f9; */
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 600;
        }

        .routine-item:last-child {
            border-bottom: none;
        }

        .btn-add {
            background-color: #ffffff21;
            color: white;
            padding: 10px 34px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-add:hover {
            background-color: #bfbfbf;
        }

        .btn-remove {
            background-color: #ff4c4c;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .btn-remove:hover {
            background-color: #ff1a1a;
        }

        input[type="text"] {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-right: 10px;
            font-size: 16px;
            width: 85%; /* Set a width for the input field */
            transition: border-color 0.3s ease;
            margin-bottom: 20px;
            color: black;
            font-weight: 500;
        }

        input[type="time"] {
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            color: black;
        }

        h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div class="daily-routine-section">
        <h2>My Daily Routine</h2>
        <input type="text" id="routineInput" placeholder="Enter your routine(e.g., 8 am - wake up)">
        <input type="time" id="routineTime" value="08:00">
        <button class="btn-add" id="addButton">ADD</button>
        <div id="routineList"></div>
    </div>

    <script>
        document.getElementById('addButton').addEventListener('click', function() {
            const routine = document.getElementById('routineInput').value;
            const time = document.getElementById('routineTime').value;

            if (routine) {
                const routines = JSON.parse(localStorage.getItem('userRoutines')) || [];
                routines.push({ routine, time });
                localStorage.setItem('userRoutines', JSON.stringify(routines));

                document.getElementById('routineInput').value = ''; // Clear input
                document.getElementById('routineTime').value = '08:00'; // Reset time input
                updateRoutineList();
            } else {
                // alert("Enter a routine!");
            }
        });

        function updateRoutineList() {
            const routines = JSON.parse(localStorage.getItem('userRoutines')) || [];
            const routineList = document.getElementById('routineList');
            routineList.innerHTML = ''; // Clear previous routines

            routines.forEach((item, index) => {
                const routineItem = document.createElement('div');
                routineItem.classList.add('routine-item');

                routineItem.innerHTML = `
                    <span>At : ${item.time} - ${item.routine}</span>
                    <button class="btn-remove" onclick="removeRoutine(${index})">X</button>
                `;

                routineList.appendChild(routineItem);
            });
        }

        function removeRoutine(index) {
            const routines = JSON.parse(localStorage.getItem('userRoutines')) || [];
            routines.splice(index, 1); // Remove the routine at the given index
            localStorage.setItem('userRoutines', JSON.stringify(routines));
            updateRoutineList(); // Refresh the routine list
        }

        function initializeRoutineTracker() {
            updateRoutineList();
        }

        initializeRoutineTracker();
    </script>

</body>
</html>
