<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BsGuardian</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@300;600&display=swap');

        * {
            color: rgb(255, 255, 255);
            font-family: "Red Hat Display", sans-serif;
            letter-spacing: 0.5px;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #02153d;
            color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .punishment-box {
            background-color: #282828;
            border-radius: 8px;
            padding: 20px;
            max-width: 600px;
            text-align: center;
            white-space: pre-wrap; /* Preserve whitespace for formatting */
            margin-bottom: 20px;
            border: solid 1px gray;
        }

        h2 {
            color: #fff;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-done, .btn-start {
            background-color: #ffffff21;
            color: white;
            padding: 10px 34px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
            margin-bottom: 25px;
        }

        .btn-done:hover, .btn-start:hover {
            background-color: #bfbfbf;
        }

        .goal-section {
            text-align: center;
            border: solid 1.5px gray;
            padding: 30px;
            border-radius: 12px;
            background: #ffffff30;
            overflow-y: auto; /* Allow scrolling */
            max-height: 300px; 
            position: fixed;
        }

        .goal-section input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-right: 10px;
            font-size: 16px;
            width: 250px; /* Set a width for the input field */
            transition: border-color 0.3s ease;
            margin-bottom: 20px;
            color: black;
            font-weight: 500;
        }

        .goal-section input:focus {
            border-color: #4CAF50; /* Change border color on focus */
            outline: none; /* Remove default outline */
        }

        .goal-info {
            margin-top: 20px;
            font-size: 18px;
            color: #ff9800;
        }

        .punishment {
            position: fixed;
            top: 5%;
            border: solid 1.5px gray;
            padding: 20px;
            border-radius: 9px;
            background: #ffffff30;
        }

        .goal-item {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-delete {
            background-color: #ff4c4c;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .btn-delete:hover {
            background-color: #ff1a1a;
        }
    </style>
</head>
<body>

    <div class="goal-section">
        <h2>Track Your Goals</h2>
        <input type="text" id="goalInput" placeholder="Enter your goal (e.g., wake up early)">
        <button class="btn-start" id="startButton">Start</button>
        <div id="goalList"></div>
    </div>

    <script src="todo.js">
        
    </script>

</body>
</html>
