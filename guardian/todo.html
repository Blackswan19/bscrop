<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BsGuardian</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@300;600&display=swap');

        * {
            color: rgb(255, 255, 255);
            font-family: "Red Hat Display", sans-serif;
            letter-spacing: 0.5px;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #181818;
            color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .punishment-box {
            background-color: #282828;
    padding: 12px;
    max-width: 600px;
    text-align: center;
    white-space: pre-wrap;
    margin-bottom: 20px;
    border-left: solid 5px #0e4bff;
        }

        h2 {
            color: #fff;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-done, .btn-start {
            background-color: #0e4bff;
            color: white;
            padding: 8px 31px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.3s ease;
            margin-bottom: 25px;
        }

        .btn-done:hover, .btn-start:hover {
            background-color: #0e4affb0;
        }

        .goal-section {
            text-align: center;
            padding: 30px;

            background: #3c3c3c;
            overflow-y: auto; /* Allow scrolling */
            max-height: 300px; 
            position: fixed;
            bottom: 10%;
        }

        .goal-section input {
            padding: 10px;
            border-radius: 5px;
            margin-right: 10px;
            font-size: 16px;
            width: 250px;
            margin-bottom: 20px;
            color: rgb(255, 255, 255);
            font-weight: 800;
            background: #9f9f9f;
            outline: none;
            border: none;
        }

        .goal-section input:focus {
            border-color: #4CAF50; /* Change border color on focus */
            outline: none; /* Remove default outline */
        }

        .goal-info {
            margin-top: 20px;
            font-size: 18px;
            color: #ff9800;
        }

        .punishment {
            position: fixed;
            top: 5%;
            padding: 20px;
            background: #3c3c3c;
        }

        .goal-item {
            margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #282828;
    padding: 10px;
    border-left: solid 5px #0e4bff;
        }

        .btn-delete {
            background-color: #0e4bff;
    color: white;
    border: none;
    border-radius: 2px;
    padding: 8px 14px;
    cursor: pointer;
    font-weight: 900;
        }

        .btn-delete:hover {
            background-color: #0e4affb0;
        }
    </style>
</head>
<body>

    <div class="punishment">
        <h2>You have to do..!</h2>
        <div class="punishment-box" id="punishment"></div>
        <button class="btn-done" id="doneButton">Done</button>
    </div>

    <div class="goal-section">
        <h2>Track Your Goals</h2>
        <input type="text" id="goalInput">
        <button class="btn-start" id="startButton">Start</button>
        <div id="goalList"></div>
    </div>

    <script src="todo.js">
        
    </script>

</body>
</html>
