<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Weekly Spends</title>
    <style>
        * {
            color: rgb(255, 255, 255);
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #02153d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff30;
            border-radius: 10px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        h1, h2 {
            color: #fff;
            font-weight: bold;
            font-size: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            border: 1px solid #444;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #444;
            padding: 12px;
            text-align: left;
            background-color: #444;
            color: #fff;
        }

        th {
            background: #ffffff30;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        button {
            background-color: #ffffff21;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 4px;
        }

        button:hover {
            background-color: #0041ff;
        }

        /* Modal Styles */
        .popup-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            display: none;
        }

        .popup-content {
            background-color: #1d1d1d;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    width: 80%;
    max-width: 400px;
    border: solid 1px #0027ff;
        }

        .popup-content button {
            background-color: #0027ff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Compare Weekly Spends</h1>
        <form id="expense-form">
            <label for="today">Enter Today's Spend:</label>
            <input type="number" id="today" min="0" step="0.01">
            <button type="button" onclick="saveExpenses()">Save Today's Spend</button>
        </form>

        <h2>Total Weekly Expenses: ₹<span id="total-expenses">0.00</span></h2>
        <button type="button" id="compare-button" onclick="calculateExpenses()">Compare Weekly Spends</button>

        <h2>Monthly Weekly Spends</h2>
        <table id="weekly-expenses-table">
            <thead>
                <tr>
                    <th>Week</th>
                    <th>Weekly Expenses (₹)</th>
                </tr>
            </thead>
            <tbody>
                <!-- Weekly expenses will be displayed here -->
            </tbody>
        </table>
    </div>

    <!-- Modal Popup -->
    <div id="popup-modal" class="popup-modal">
        <div class="popup-content">
            <p id="popup-message"></p>
            <button type="button" onclick="closePopup()">Close</button>
        </div>
    </div>

    <script>
        let sundayClicked = false;

        // Save today's expense to localStorage
        function saveExpenses() {
            const todayInput = document.getElementById('today').value;
            if (!todayInput) {
                showPopup("Enter today's spend.");
                return;
            }

            const todaySpend = parseFloat(todayInput);
            const dailyExpenses = JSON.parse(localStorage.getItem("dailyExpenses")) || {
                monday: 0, tuesday: 0, wednesday: 0, thursday: 0, friday: 0, saturday: 0, sunday: 0
            };

            const dayOfWeek = new Date().getDay();
            const dayMap = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];

            // Save today's spend
            const todayDay = dayMap[dayOfWeek];
            dailyExpenses[todayDay] = todaySpend;
            localStorage.setItem("dailyExpenses", JSON.stringify(dailyExpenses));

            showPopup(`Today's spend (₹${todaySpend}) saved.`);
        }

        // Function to calculate weekly expenses
        function calculateExpenses() {
            const today = new Date();
            const dayOfWeek = today.getDay();

            if (dayOfWeek !== 0) {
                showPopup("You can only compare weekly spends on Sundays.");
                return;
            }

            if (sundayClicked) {
                showPopup("You've already compared spends this Sunday.");
                return;
            }

            let dailyExpenses = JSON.parse(localStorage.getItem("dailyExpenses")) || {
                monday: 0, tuesday: 0, wednesday: 0, thursday: 0, friday: 0, saturday: 0, sunday: 0
            };

            let weeklyTotal = dailyExpenses.monday + dailyExpenses.tuesday + dailyExpenses.wednesday +
                              dailyExpenses.thursday + dailyExpenses.friday + dailyExpenses.saturday + dailyExpenses.sunday;

            // Save weekly expenses
            let weeklyExpenses = JSON.parse(localStorage.getItem("weeklyExpenses")) || [];
            if (weeklyExpenses.length >= 4) {
                showPopup("You've already tracked expenses for 4 weeks.");
                return;
            }

            weeklyExpenses.push(weeklyTotal);
            localStorage.setItem("weeklyExpenses", JSON.stringify(weeklyExpenses));
            displayWeeklyExpenses();
            updateTotal(weeklyTotal);

            sundayClicked = true;

            // Clear daily expenses after the week
            localStorage.removeItem("dailyExpenses");
            resetInputs();

            setTimeout(function() {
                sundayClicked = false; // Allow button to be clicked again next Sunday
            }, 7 * 24 * 60 * 60 * 1000);
        }

        // Function to display weekly expenses
        function displayWeeklyExpenses() {
            const weeklyExpenses = JSON.parse(localStorage.getItem("weeklyExpenses")) || [];
            const tableBody = document.querySelector('#weekly-expenses-table tbody');
            tableBody.innerHTML = '';

            weeklyExpenses.forEach((expense, index) => {
                const row = document.createElement('tr');
                const weekCell = document.createElement('td');
                const expenseCell = document.createElement('td');

                weekCell.textContent = 'Week ' + (index + 1);
                expenseCell.textContent = '₹' + expense.toFixed(2);

                row.appendChild(weekCell);
                row.appendChild(expenseCell);
                tableBody.appendChild(row);
            });
        }

        // Function to update total weekly expenses display
        function updateTotal(total) {
            document.getElementById('total-expenses').textContent = total.toFixed(2);
        }

        // Reset input fields
        function resetInputs() {
            document.getElementById('today').value = '';
        }

        // Popup functionality
        function showPopup(message) {
            document.getElementById('popup-message').textContent = message;
            document.getElementById('popup-modal').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('popup-modal').style.display = 'none';
        }

        // Load weekly expenses on page load
        window.onload = function() {
            displayWeeklyExpenses();
        };
    </script>
</body>
</html>
