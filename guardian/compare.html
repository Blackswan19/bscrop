<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Spend Tracker</title>
    <style>
        *{
            color: white;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #02153d;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 10% auto;
            background: #ffffff30;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .spend-list {
            list-style: none;
            padding: 0;
        }

        .spend-list li {
            padding: 10px;
            background-color: #eaeaea2b;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
            color: white;
        }

        button {
            padding: 8px 16px;
            background-color: #ffffff21;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0041ff;
        }

        input {
            padding: 10px 45px;
            margin-right: 10px;
            width: 60%;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-bottom: 15px;

        }

        .week-summary {
            margin-top: 20px;
            background-color: #9896ff;
            padding: 10px;
            border-radius: 8px;
        }

        .week-history {
            margin-top: 20px;
            background-color: #91cdc885;
            padding: 10px;
            border-radius: 8px;
        }

        .week-history h3 {
            margin-bottom: 10px;
        }

        .week-history ul {
            list-style: none;
            padding: 0;
        }

        .week-history ul li {
            background-color: #eaeaea;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>Compare spends</h1>

    <input type="number" id="spend-input" placeholder="Enter today's spend..." min="0">
    <button id="add-spend">Add Spend</button>

    <h2>Today's Spend</h2>
    <ul id="spend-list" class="spend-list"></ul>

    <h3>Total Today's Spend: $<span id="total-spend">0</span></h3>

    <div class="week-summary">
        <h3>This Week's Spend: <span id="this-week-spend">0</span></h3>
    </div>

    <div class="week-history">
        <h3>Previous Weeks' Spends: </h3>
        <ul id="week-history-list"></ul>
    </div>
</div>

<script>
    // Initialize data from local storage
    let spends = JSON.parse(localStorage.getItem('spends')) || [];
    let weeklySpends = JSON.parse(localStorage.getItem('weeklySpends')) || [];
    let currentWeekTotal = parseFloat(localStorage.getItem('currentWeekTotal')) || 0;

    // Get today's date
    const today = new Date();
    const todayString = today.toISOString().split('T')[0]; // YYYY-MM-DD format

    // Function to update daily spend list
    function updateSpendList() {
        const spendList = document.getElementById('spend-list');
        const totalSpend = document.getElementById('total-spend');
        spendList.innerHTML = '';
        let total = 0;

        spends.forEach((spend, index) => {
            const li = document.createElement('li');
            li.innerHTML = `
                $${spend}
                <button onclick="removeSpend(${index})">Remove</button>
            `;
            spendList.appendChild(li);
            total += parseFloat(spend);
        });

        totalSpend.textContent = total.toFixed(2);
    }

    // Function to add a spend for today
    function addSpend() {
        const spendInput = document.getElementById('spend-input');
        const spendAmount = parseFloat(spendInput.value);

        if (isNaN(spendAmount) || spendInput.value === '') {
            alert('Please enter a valid spend amount');
            return;
        }

        spends.push(spendAmount);
        localStorage.setItem('spends', JSON.stringify(spends));

        spendInput.value = '';  // Clear the input
        updateSpendList();
        updateWeeklyTotal(spendAmount); // Update weekly total with today's spend
    }

    // Function to remove a spend
    function removeSpend(index) {
        const removedSpend = spends[index];
        spends.splice(index, 1);
        localStorage.setItem('spends', JSON.stringify(spends));
        updateSpendList();
        updateWeeklyTotal(-removedSpend); // Subtract removed spend from weekly total
    }

    // Function to update weekly total
    function updateWeeklyTotal(amount) {
        currentWeekTotal += amount; // Add today's spend or subtract removed spend
        localStorage.setItem('currentWeekTotal', currentWeekTotal);
        document.getElementById('this-week-spend').textContent = currentWeekTotal.toFixed(2);
    }

    // Function to reset weekly spends on Sunday
    function resetWeeklySpends() {
        const lastReset = localStorage.getItem('lastResetDate');

        // Check if a reset is needed (only on Sunday)
        if (today.getDay() === 0) { // Sunday is day 0
            if (lastReset !== todayString) {
                // Store current week's total in weeklySpends array
                if (currentWeekTotal > 0) {
                    const weekData = { total: currentWeekTotal, spends: [...spends] };
                    weeklySpends.push(weekData);
                    localStorage.setItem('weeklySpends', JSON.stringify(weeklySpends));
                }

                // Reset for the new week
                currentWeekTotal = 0;
                spends = [];
                localStorage.setItem('spends', JSON.stringify(spends));
                localStorage.setItem('currentWeekTotal', currentWeekTotal);
                localStorage.setItem('lastResetDate', todayString); // Update the last reset date
            }
        }
    }

    // Function to display the history of weekly spends
    function displayWeeklyHistory() {
        const weekHistoryList = document.getElementById('week-history-list');
        weekHistoryList.innerHTML = '';
        weeklySpends.forEach((weekData, index) => {
            const li = document.createElement('li');
            li.innerHTML = `
                Week ${index + 1} Spend: $${weekData.total.toFixed(2)}<br>
                Spends: ${weekData.spends.join(', ')}
            `;
            weekHistoryList.appendChild(li);
        });
    }

    // Add event listener to the "Add Spend" button
    document.getElementById('add-spend').addEventListener('click', addSpend);

    // Update the view
    updateSpendList();
    displayWeeklyHistory();
    resetWeeklySpends();

</script>

</body>
</html>
