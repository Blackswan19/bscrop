<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BsGuardian</title>
  <link rel="icon" type="image/x-icon" href="https://i.ibb.co/gW8Py0B/BS.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Orbitron:wght@400..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Strait&display=swap');

    * {
      color: rgb(255, 255, 255);
      font-family: "Red Hat Display", sans-serif;
      letter-spacing: 0.5px;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #37474F;
      color: white;
      text-align: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      color: #00b6ff;
    font-size: 21px;
    margin: 0;
    position: absolute;
    top: 25px;
    left: 47px;
    font-weight: bold;
    border: solid 1.5px #00b6ff;
    padding: 5px 67px;
    border-radius: 8px;
    }

    .timer {
      font-size: 3em;
    background-color: #282828;
    color: white;
    padding: 4px 49px;
    border-radius: 6px;
    width: fit-content;
    margin-top: 0px;
    margin-bottom: 50px;
    border: solid 1px gray;
    }

    .btn {
      margin: 10px 0;
    padding: 8px 20px;
    background-color: #ffffff21;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 1em;
    cursor: pointer;
    width: 200px;
    }

    .btn:hover {
      background-color: #bfbfbf;
    }

    .text-section {
      margin-top: 60px;
    font-size: 24px;
    text-align: left;
    float: left;
    width: 80%;
    line-height: 1.8;
    padding-left: 20px;
    font-weight: 500;
    }

    .text-section a {
      display: block;
      margin: 10px 0;
      color: white;
      text-decoration: none;
    }
    .help {
      margin-top: auto;
      font-size: 0.9em;
      color: #b0bec5;
      position: absolute;
      bottom: 10px;
      right: 20px;
    }
    
  </style>
</head>
<body>
  <h1>BsGuardian</h1>

  <div class="timer" id="timer">00:00:00</div>

  <button class="btn" id="startBtn">Start Stopwatch</button>
  <button class="btn" id="resetBtn">Reset Stopwatch</button>

  <div class="text-section">
    <a href="routine.html">Your routine ✓</a>
    <a href="todo.html">You have to do..!</a>
    <a href="https://blackswan19.github.io/Educate/savenotes.html">Any Important note?</a>
    <a href="compare.html">Compare spends..$</a>
  </div>

  <div class="help">Help..?</div>

  <script>
    // Get the timer element, start button, and reset button
    const timerElement = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
  
    // Create a variable to store the interval ID
    let intervalId;
  
    // Function to format the time
    function formatTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secondsLeft = seconds % 60;
  
      return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secondsLeft.toString().padStart(2, '0')}`;
    }
  
    // Function to start the timer
    function startTimer() {
      let seconds = parseInt(localStorage.getItem('timerSeconds')) || 0;
      intervalId = setInterval(() => {
        seconds++;
        timerElement.textContent = formatTime(seconds);
        localStorage.setItem('timerSeconds', seconds);
      }, 1000);
    }
  
    // Function to reset the timer
    function resetTimer() {
      clearInterval(intervalId);
      timerElement.textContent = '00:00:00';
      localStorage.removeItem('timerSeconds');
    }
  
    // Event listeners for the buttons
    startBtn.addEventListener('click', startTimer);
    resetBtn.addEventListener('click', resetTimer);
  
    // Remove the initial call to startTimer()
    // Instead, the timer will only start when the user clicks the button
  </script>
</body>
</html>
