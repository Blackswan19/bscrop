          <button id="openModal">My Watch List</button>
      
          <!-- The Modal -->
          <div id="movieModal" class="modal">
              <!-- Modal content -->
              <div class="modal-content">
                  <span class="close">&times;</span>
                  <h2>Save Your Watch List here</h2>
                  <form id="movieForm">
                      <label for="movie">Enter Movie Name:</label>
                      <input type="text" id="movie" name="movie" required><br><br>
                      <button type="submit">Save</button>
                  </form>
                  <p id="movieList"></p>
              </div>
          </div>
      
          <script>
            // Get the modal
            var modal = document.getElementById("movieModal");
    
            // Get the button that opens the modal
            var btn = document.getElementById("openModal");
    
            // Get the <span> element that closes the modal
            var span = document.getElementsByClassName("close")[0];
    
            // Display the modal when the button is clicked
            btn.onclick = function() {
                modal.style.display = "block";
            }
    
            // Close the modal when clicking the 'x'
            span.onclick = function() {
                modal.style.display = "none";
            }
    
            // Close the modal when clicking outside of it
            window.onclick = function(event) {
                if (event.target == modal) {
                    modal.style.display = "none";
                }
            }
    
            // Handle form submission
            var form = document.getElementById("movieForm");
            var movieListEl = document.getElementById("movieList");
            var movieList = JSON.parse(localStorage.getItem("movieList")) || []; // Load from local storage
    
            // Update the displayed movie list
            function updateMovieList() {
                movieListEl.innerHTML = ''; // Clear previous content
                if (movieList.length === 0) {
                    movieListEl.innerHTML = '<p>No movies saved.</p>';
                } else {
                    movieList.forEach((movie, index) => {
                        const movieItem = document.createElement('div');
                        movieItem.classList.add('movie-item');
                        movieItem.innerHTML = `<hr>
                            <span>${movie}</span>
                            <button class="delete-btn" onclick="deleteMovie(${index})">Delete</button>
                        `;
                        movieListEl.appendChild(movieItem);
                    });
                }
            }
    
            // Initial list load when page is opened
            updateMovieList();
    
            // Add movie to the list
            form.onsubmit = function(event) {
                event.preventDefault();
                var movie = document.getElementById("movie").value;
                if(movie) {
                    movieList.push(movie);
                    localStorage.setItem("movieList", JSON.stringify(movieList)); // Save to local storage
                    document.getElementById("movie").value = ''; // Clear the input
                    updateMovieList(); // Update the list display
                }
                modal.style.display = "none"; // Close the modal after saving
            }
    
            // Delete a movie from the list
            function deleteMovie(index) {
                movieList.splice(index, 1); // Remove the movie at the given index
                localStorage.setItem("movieList", JSON.stringify(movieList)); // Save the updated list to local storage
                updateMovieList(); // Update the list display
            }
        </script>
