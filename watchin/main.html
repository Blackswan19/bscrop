<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Popup Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
        }

        .box img {
            width: 150px;
            height: auto;
            margin: 10px;
            cursor: pointer;
            border: 2px solid #ff001e;
            border-radius: 8px;
        }

        /* Popup Overlay */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* Popup Content */
        .popup-content {
            background: #1b1b1b;
            padding: 20px;
            text-align: center;
            width: 90%;
           height: 100%;
        }

        .popup-content img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .popup-content button {
            background: #ff001e;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>Image Popup Example</h1>
        </header>

        <section class="main-container">
            <h2>Select an Image</h2>
            <div class="box">
                <img src="https://i.ytimg.com/vi/68wSTlrw_RQ/hq720.jpg" onclick="openPopup(this.src, 'https://www.youtube.com/watch?v=68wSTlrw_RQ')" alt="Image 1">
                <img src="https://i.ytimg.com/vi/w4l6yDmoepA/hq720.jpg" onclick="openPopup(this.src, 'https://youtu.be/w4l6yDmoepA')" alt="Image 2">
                <!-- Add more images here -->
            </div>
        </section>

        <!-- Popup Overlay -->
        <div id="popupOverlay" class="popup-overlay">
            <div class="popup-content">
                <span class="close-btn" onclick="closePopup()">&times;</span>
                <img id="popupImage" src="" alt="Popup Image">
                <button id="playButton" onclick="playVideo()">Play</button>
            </div>
        </div>
    </div>

    <script>
        let videoUrl; // To store the URL passed to the popup

        function openPopup(imageSrc, video) {
            document.getElementById('popupOverlay').style.display = 'flex';
            document.getElementById('popupImage').src = imageSrc;
            videoUrl = video; // Store the video URL
        }

        function closePopup() {
            document.getElementById('popupOverlay').style.display = 'none';
        }

        function modifyLink(videoUrl) {
    let modifiedUrl = videoUrl;

    // Modify the URL based on the given conditions
    if (videoUrl.includes("youtu.be")) {
        modifiedUrl = `https://www.yout-ube.com/watch?v=${videoUrl.split("youtu.be/")[1].split("?")[0]}`;
    } else if (videoUrl.includes("youtube.com")) {
        modifiedUrl = videoUrl.replace(/youtube/i, "yout-ube");
    }

    // Open the modified URL in a new tab
    if (modifiedUrl.includes("yout-ube.com/watch?v=")) {
        window.open(modifiedUrl, "_blank");
        document.getElementById("playButton").style.display = "none"; // Hide the play button if needed
    } else {
        document.getElementById("result").innerHTML = "Invalid URL";
    }
}

function playVideo() {
    modifyLink(videoUrl); // Call modifyLink with the stored videoUrl
}

    </script>
</body>
</html>
