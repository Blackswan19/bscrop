<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>M | Incexp</title> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-S..." crossorigin="anonymous" referrerpolicy="no-referrer" /> <style> @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap'); * { -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; scrollbar-width: thin;letter-spacing: 0.3px; scrollbar-color: rgba(255, 255, 255, 0.648) transparent; } * { -webkit-tap-highlight-color: transparent; } body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; } body { background: #151e27; color: #e0e0e5; height: 100vh; padding: 16px 12px; display: flex; flex-direction: column; align-items: center; } a { text-decoration: none; color: inherit; } h1 { color: #ffffffa8; font-size: 1.9rem; font-weight: 500; margin: 76px 0 32px 0; text-align: center; } .container { width: 100%; max-width: 480px; } .balance-display { background: #283543; border-radius: 15px; padding: 10px 15px; margin-bottom: 24px; font-size: 22px; font-weight: 300; display: flex; justify-content: center; align-items: center; gap: 10px; } #balance { color: #4fc3f7; font-weight: 700; } .form-group{ margin: 20px 0px 15px 0px; } .form-group label { display: block; color: #ffffff69; font-size: 0.84rem; font-weight: 500; margin-bottom: 6px; } .form-group input, .form-group select { width: 100%; padding: 10px 0; border-radius: 12px; font-size: 1rem; outline: none; transition: border-color 0.18s; background: black; color: white; border: 1.5px solid #283543; text-align: center; } button { color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 0.96rem; font-weight: 400; cursor: pointer; transition: background 0.16s; background: #1f2d3a; } /* Floating action buttons */ .toggle-form-btn, .toggle-period-btn { border-radius: 10px; background: #283543; color: white; font-size: 23px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; width: 40px; height: 40px; border: none; padding: 0px; }.bottomoptions { display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 10px; width: 100%;left: 0px; } /* Transaction list */ .transaction-table-container { background: transparent; border-radius: 10px; overflow: hidden; border: none; margin-top: 16px; height: fit-content; overflow-y: scroll; scrollbar-width: none; scrollbar-color: gray transparent; max-height: 400px; color: white; border: 1px solid #283543; } .transaction-table { width: 100%; border-collapse: collapse; } .transaction-table th { background: #283543; color: #ffffff45; font-size: 0.81rem; font-weight: 600; padding: 12px 8px; position: sticky; top: 0; z-index: 2; text-transform: uppercase; text-align: center; } .transaction-table td { padding: 2px; font-size: 15px; text-align: center; background: transparent; height: fit-content; overflow: auto; scrollbar-width: none; max-width: 0px; color: white; border: 1px solid #283543; white-space: nowrap; } .transaction-table .income { color: #00ff00; font-weight: 500; } .transaction-table .expense { color: red; font-weight: 500; } .delete-btn { background: red; border: none; font-size: 1.18rem; cursor: pointer; padding: 0px; display: flex; justify-content: center; align-items: center; width: 100%; } .delete-btn:hover { color: #ef5350; } /* Transaction popup (centered modal) */ .transaction-popup { position: fixed; inset: 0; background: #00000099; display: none; align-items: center; justify-content: center; z-index: 2000; } .transaction-popup.active { display: flex; } .transaction-popup > div { position: relative; background: #151e27; padding: 15px; width: 85%; max-width: 400px; border: 1px solid #283543; border-radius: 20px; z-index: 20000; } .close-transaction { background: none; border: none; color: #ffffff66; font-size: 16px; cursor: pointer; font-weight: 100; position: absolute; right: -5px; top: 5px; } /* Period summary side sheet */ .period-slider { position: fixed; top: 0; right: -130%; width: 90%; max-width: 420px; height: 100%; background: #090909; border-left: 1px solid #ffffff09; transition: right 0.28s cubic-bezier(0.4,0,0.2,1); z-index: 1500; padding: 24px 20px; color: #e0e0e5; overflow-y: auto; } .period-slider.active { right: 0; } .close-period-slider { position: absolute; top: 5px; right: -5px; background: none; border: none; color: #ffffff86; font-size: 1.5rem; cursor: pointer; font-weight: 100; } .period-result { margin-top: 20px; padding: 16px; background: #1f2d3a; border-radius: 12px; border: 1px solid #1e1e25; line-height: 1.55; } .period-result .days-between { color: #00b0ff; font-weight: 600; } .period-result .income { color: #00ff00; } .period-result .expense { color: red; } .period-result .net-balance { color: #ffc400; font-weight: 600; } /* Filter (top-right) */ .form-group.filter { position: fixed; top: 0px; right: 16px; z-index: 900; } #filter-type { background: #283543; color: #e0e0e5; border: transparent; padding: 6px; border-radius: 8px; font-size: 0.9rem; } /* Options row in popup */ .options { display: flex; gap: 12px; margin-top: 8px; } .options button { flex: 1; } .options button:nth-child(2) { background: #ffffff23; } .options button:nth-child(2):hover { background: #ffffff13; } /* Responsive */ @media (max-width: 480px) { } </style> </head> <body> <a><h1>M | Incexp</h1></a> <div class="container"> <!-- Floating buttons --> <div class="bottomoptions"> <button class="toggle-form-btn" id="toggle-form"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M458.62-148.63Q450-157.25 450-170v-280H170q-12.75 0-21.37-8.63-8.63-8.63-8.63-21.38 0-12.76 8.63-21.37Q157.25-510 170-510h280v-280q0-12.75 8.63-21.37 8.63-8.63 21.38-8.63 12.76 0 21.37 8.63Q510-802.75 510-790v280h280q12.75 0 21.37 8.63 8.63 8.63 8.63 21.38 0 12.76-8.63 21.37Q802.75-450 790-450H510v280q0 12.75-8.63 21.37-8.63 8.63-21.38 8.63-12.76 0-21.37-8.63Z"/></svg></button> <button class="toggle-period-btn" id="toggle-period"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M294.96-412.65q-10.34-10.35-10.34-25.04t10.34-25.04q10.35-10.35 25.04-10.35t25.04 10.35q10.34 10.35 10.34 25.04t-10.34 25.04q-10.35 10.34-25.04 10.34t-25.04-10.34Zm160 0q-10.34-10.35-10.34-25.04t10.34-25.04q10.35-10.35 25.04-10.35t25.04 10.35q10.34 10.35 10.34 25.04t-10.34 25.04q-10.35 10.34-25.04 10.34t-25.04-10.34Zm160 0q-10.34-10.35-10.34-25.04t10.34-25.04q10.35-10.35 25.04-10.35t25.04 10.35q10.34 10.35 10.34 25.04t-10.34 25.04q-10.35 10.34-25.04 10.34t-25.04-10.34ZM212.31-100Q182-100 161-121q-21-21-21-51.31v-535.38Q140-738 161-759q21-21 51.31-21h55.38v-53.85q0-13.15 8.81-21.96 8.81-8.8 21.96-8.8 13.16 0 21.96 8.8 8.81 8.81 8.81 21.96V-780h303.08v-54.61q0-12.77 8.61-21.39 8.62-8.61 21.39-8.61 12.77 0 21.38 8.61 8.62 8.62 8.62 21.39V-780h55.38Q778-780 799-759q21 21 21 51.31v535.38Q820-142 799-121q-21 21-51.31 21H212.31Zm0-60h535.38q4.62 0 8.46-3.85 3.85-3.84 3.85-8.46v-375.38H200v375.38q0 4.62 3.85 8.46 3.84 3.85 8.46 3.85ZM200-607.69h560v-100q0-4.62-3.85-8.46-3.84-3.85-8.46-3.85H212.31q-4.62 0-8.46 3.85-3.85 3.84-3.85 8.46v100Zm0 0V-720v112.31Z"/></svg></button> </div> <!-- Balance --> <div class="balance-display"> <span id="balance-label" style="color:#a0a0b0;">Total</span> <span id="balance">0.00</span> </div> <!-- Filter --> <div class="form-group filter"> <select id="filter-type" onchange="renderTransactions()"> <option value="all">All</option> <option value="income">Income</option> <option value="expense">Expense</option> </select> </div> <!-- Transactions Table --> <div class="transaction-table-container"> <table class="transaction-table"> <thead> <tr> <th>For</th> <th>Rs</th> <th>Type</th> <th>Date</th> <th></th> </tr> </thead> <tbody id="transaction-list"></tbody> </table> </div> </div> <!-- Add Transaction Popup --> <div class="transaction-popup" id="transaction-popup"> <div> <button class="close-transaction" onclick="closeTransactionPopup()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-437.85 277.08-234.92q-8.31 8.3-20.89 8.5-12.57.19-21.27-8.5-8.69-8.7-8.69-21.08 0-12.38 8.69-21.08L437.85-480 234.92-682.92q-8.3-8.31-8.5-20.89-.19-12.57 8.5-21.27 8.7-8.69 21.08-8.69 12.38 0 21.08 8.69L480-522.15l202.92-202.93q8.31-8.3 20.89-8.5 12.57-.19 21.27 8.5 8.69 8.7 8.69 21.08 0 12.38-8.69 21.08L522.15-480l202.93 202.92q8.3 8.31 8.5 20.89.19 12.57-8.5 21.27-8.7 8.69-21.08 8.69-12.38 0-21.08-8.69L480-437.85Z"/></svg></button> <div class="form-group"> <label for="transaction-type">Type</label> <select id="transaction-type"> <option value="income">Income</option> <option value="expense">Expense</option> </select> </div> <div class="form-group"> <label for="transaction-description">For</label> <input type="text" id="transaction-description" placeholder="Salary / Grocery / etc" autocomplete="off"/> </div> <div class="form-group"> <label for="transaction-amount">Amount</label> <input type="number" id="transaction-amount" placeholder="0.00" step="0.01" min="0"/> </div> <div class="form-group"> <label for="transaction-date">Date</label> <input type="date" id="transaction-date"/> </div> <div class="options"> <button id="add-transaction">Add</button> <!-- <button onclick="closeTransactionPopup()">Cancel</button> --> </div> </div> </div> <!-- Period Summary Side Sheet --> <div id="period-slider" class="period-slider"> <button class="close-period-slider" onclick="closePeriodSlider()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-437.85 277.08-234.92q-8.31 8.3-20.89 8.5-12.57.19-21.27-8.5-8.69-8.7-8.69-21.08 0-12.38 8.69-21.08L437.85-480 234.92-682.92q-8.3-8.31-8.5-20.89-.19-12.57 8.5-21.27 8.7-8.69 21.08-8.69 12.38 0 21.08 8.69L480-522.15l202.92-202.93q8.31-8.3 20.89-8.5 12.57-.19 21.27 8.5 8.69 8.7 8.69 21.08 0 12.38-8.69 21.08L522.15-480l202.93 202.92q8.3 8.31 8.5 20.89.19 12.57-8.5 21.27-8.7 8.69-21.08 8.69-12.38 0-21.08-8.69L480-437.85Z"/></svg></button> <h2 style="margin-bottom: 20px; color: #ffffff7d; font-weight: 400;">Filter</h2> <div class="form-group"> <label for="start-date">Start Date</label> <input type="date" id="start-date"/> </div> <div class="form-group"> <label for="end-date">End Date</label> <input type="date" id="end-date"/> </div> <div class="form-group"> <label for="period-type">Show</label> <select id="period-type"> <option value="all">All</option> <option value="income">Income</option> <option value="expense">Expense</option> </select> </div> <button id="calculate-period" style="width:100%; margin:16px 0 8px;">Calculate</button> <div id="period-result" class="period-result"></div> </div>
<script>
    let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

    function setDefaultDates() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById("transaction-date").value = today;
      document.getElementById("start-date").value = today;
      document.getElementById("end-date").value = today;
    }

   document.addEventListener('contextmenu', e => e.preventDefault());
    document.getElementById("toggle-form").addEventListener("click", () => {
      const popup = document.getElementById("transaction-popup");
      const btn = document.getElementById("toggle-form");
      popup.classList.toggle("active");
      btn.textContent = popup.classList.contains("active") ? "×" : "+";
    });

    function closeTransactionPopup() {
      document.getElementById("transaction-popup").classList.remove("active");
      document.getElementById("toggle-form").textContent = "+";
    }

    // Toggle period slider
    document.getElementById("toggle-period").addEventListener("click", () => {
      document.getElementById("period-slider").classList.toggle("active");
      document.getElementById("period-result").innerHTML = "";
    });

    function closePeriodSlider() {
      document.getElementById("period-slider").classList.remove("active");
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}`;
    }

    function addTransactionToTable(t, index) {
      const tbody = document.getElementById("transaction-list");
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${t.description}</td>
        <td>${t.amount.toFixed(0)}</td>
        <td class="${t.type}">${t.type}</td>
        <td>${formatDate(t.date)}</td>
        <td><button class="delete-btn" onclick="deleteTransaction(${index})"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M331.86-129.92q-69.37-29.92-120.68-81.21-51.31-51.29-81.25-120.63Q100-401.1 100-479.93q0-78.84 29.92-148.21t81.21-120.68q51.29-51.31 120.63-81.25Q401.1-860 479.93-860q78.84 0 148.21 29.92t120.68 81.21q51.31 51.29 81.25 120.63Q860-558.9 860-480.07q0 78.84-29.92 148.21t-81.21 120.68q-51.29 51.31-120.63 81.25Q558.9-100 480.07-100q-78.84 0-148.21-29.92ZM480-160q56.29 0 108.42-19.04 52.12-19.04 95.27-55.11L234.15-683.69q-35.69 43.15-54.92 95.27Q160-536.29 160-480q0 134 93 227t227 93Zm245.85-116.31q36.07-43.15 55.11-95.27Q800-423.71 800-480q0-134-93-227t-227-93q-56.43 0-108.68 18.85-52.24 18.84-95.01 55.3l449.54 449.54ZM480-480Z"/></svg></td>
      `;
      tbody.appendChild(tr);
    }

    function renderTransactions() {
      const tbody = document.getElementById("transaction-list");
      const filter = document.getElementById("filter-type").value;
      tbody.innerHTML = "";

      let displayedTotal = 0;

      // Show newest first
      [...transactions].reverse().forEach((t, revIdx) => {
        const origIdx = transactions.length - 1 - revIdx;
        if (filter === "all" || t.type === filter) {
          addTransactionToTable(t, origIdx);
          displayedTotal += (t.type === "income" ? t.amount : -t.amount) * (filter === "all" ? 1 : (t.type === "income" ? 1 : -1));
        }
      });

      document.getElementById("balance-label").textContent = filter === "all" ? "Total" : filter.charAt(0).toUpperCase() + filter.slice(1);
      document.getElementById("balance").textContent = Math.abs(displayedTotal).toFixed(2);
      document.getElementById("balance").style.color = displayedTotal >= 0 ? "#4fc3f7" : "#ef5350";
    }

    function saveTransactions() {
      localStorage.setItem("transactions", JSON.stringify(transactions));
    }

    function deleteTransaction(idx) {
      transactions.splice(idx, 1);
      saveTransactions();
      renderTransactions();
    }

    // Add transaction
    document.getElementById("add-transaction").addEventListener("click", () => {
      const type  = document.getElementById("transaction-type").value;
      const desc  = document.getElementById("transaction-description").value.trim();
      const amt   = parseFloat(document.getElementById("transaction-amount").value);
      const date  = document.getElementById("transaction-date").value;

      if (!desc || isNaN(amt) || amt <= 0 || !date) {
        alert("Fill all fields correctly.");
        return;
      }

      transactions.push({ description: desc, amount: amt, type, date });
      saveTransactions();
      renderTransactions();

      // Reset form
      document.getElementById("transaction-description").value = "";
      document.getElementById("transaction-amount").value = "";
      document.getElementById("transaction-date").value = new Date().toISOString().split('T')[0];
      closeTransactionPopup();
    });

    // Period calculation
    document.getElementById("calculate-period").addEventListener("click", () => {
      const start = document.getElementById("start-date").value;
      const end   = document.getElementById("end-date").value;
      const pType = document.getElementById("period-type").value;

      if (!start || !end) return alert("Select both dates");

      const s = new Date(start);
      const e = new Date(end);
      if (s > e) return alert("Start date must be before or equal to end date");

      const days = Math.floor((e - s) / 86400000) + 1;

      const filtered = transactions.filter(t => {
        const td = new Date(t.date);
        return td >= s && td <= e;
      });

      let total = 0;
      let html = "";

      filtered.filter(t => pType === "all" || t.type === pType).forEach(t => {
        const sign = t.type === "income" ? "+" : "−";
        const colorClass = t.type;
        total += t.type === "income" ? t.amount : -t.amount;
        html += `<p class="${colorClass}">${sign} ${t.amount.toFixed(0)}  —  ${t.description}</p>`;
      });

      const label = pType === "all" ? "Net" : pType.charAt(0).toUpperCase() + pType.slice(1);

      document.getElementById("period-result").innerHTML = `
        <p class="days-between">Days: ${days}</p>
        <p class="net-balance">${label}: ${total >= 0 ? "+" : ""}${total.toFixed(0)}</p>
        ${html ? `<div style="margin-top:12px;">${html}</div>` : "<p style='color:#757575;'>No transactions in this period.</p>"}
      `;
    });

    // Init
    setDefaultDates();
    renderTransactions();
  </script>
</body>
</html>
