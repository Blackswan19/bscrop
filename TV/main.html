<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Theater Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css.css">

<!-- Theater-like video screen frame -->
<div class="screen-frame">
    <video id="video" controls></video>
    <canvas id="canvas"></canvas>
    <div id="title"><a href="https://blackswan19.github.io/bscrop/formbs.html" style="text-decoration: none;color: rgba(255, 255, 255, 0.772);">BsTv</a></div> <!-- Title element -->
    <div id="controls-container">
        <div class="blend-factor-controls">
            <button class="blend-factor-button" id="decrease-blend">Decrease Blend</button>
            <button class="blend-factor-button" id="increase-blend">Increase Blend</button>
        </div>
        <input type="file" id="upload-btn" accept="video/*">
    </div>
    <div id="progress-container">
        <div id="progress-bar">
    </div>
</div>
<div class="help" id="helpBtn">Help..?</div>
    <div class="overlay" id="overlay"></div>
    <div class="popup" id="popup">
      <h2>Welcome to Bs!</h2>
      <p>BsTv is a tool that lets you watch movies. Simply upload a movie from your device to enjoy a better viewing experience!</p>
      <button id="closePopup">Close</button>
    </div>
</div>

<!-- On/Off toggle icons for showing video options -->
<i id="toggle-on" class="fa-solid fa-toggle-on"></i>
<i id="toggle-off" class="fa-solid fa-toggle-off"></i>
