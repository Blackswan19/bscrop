<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>BsTv</title> <link rel="icon" type="image/x-icon" href="https://i.ibb.co/GkDXg2B/tvlogo.png"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <link rel="stylesheet" href="css.css"> </head> <body> <div class="screen-frame"> <!-- Upload Section --> <div class="upload-section"> <div class="upload-container"> <input type="file" id="video-upload" accept="video/*" style="display: none;"> <button id="upload-btn" class="upload-button"> <i class="fas fa-upload"></i> Upload Video </button> <p id="upload-status" class="upload-status"></p> </div> </div> <video id="video"></video> <canvas id="canvas"></canvas> <div id="title"><a style="text-decoration: none; color: rgb(255, 255, 255);">BsTv</a></div> <div class="maincontent"> <div id="progress-container"> <div id="progress-bar"></div> </div> <div class="volume-control"> <button id="volume-btn"> <i class="fas fa-volume-up"></i> </button> <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" > <span id="volume-percentage">100%</span> </div> <!-- Preview --> <div id="preview-container"> <canvas id="preview-canvas"></canvas> <div id="preview-timestamp">0:00</div> </div> <div id="duration-display">0:00 / 0:00</div> <div class="help" id="helpBtn">Help..?</div> </div> <div class="overlay" id="overlay"></div> <div class="popup" id="popup"> <h1>Welcome to BsTv!</h1> <br> <p>BsTv is a tool that lets you watch movies. Simply upload a movie in the top-left area to enjoy a better viewing experience!</p> <button id="closePopup">Close</button> </div> </div> <!-- Custom Menu --> <div class="custom-menu"> <a href="https://blackswan19.github.io/bscrop/watchin/main"><button>Go to BsWatchin</button></a> <a href="https://blackswan19.github.io/bscrop/watchin/mylist"><button>Go to BsVideosaver</button></a> <a href="https://blackswan19.github.io/bscrop/formbs"><button>More From BS</button></a> </div> <!-- Controls Container --> <div id="controls-container"> <div class="blend-factor-controls"> <div id="brightness-container"> Brightness: <span id="brightness-value">0</span>% </div> <div class="mainbgcontrol"> <div id="blend-factor-display"> Dark: <span id="blend-factor-level">6</span> / 10 </div> <div class="bgcontrols"> <button class="blend-factor-button" id="decrease-blend"><i class="fa-solid fa-circle-minus"></i></button> <button class="blend-factor-button" id="increase-blend"><i class="fa-solid fa-circle-plus"></i></button> </div> </div> </div> <div class="playpause"> <button id="backward-btn"><i class="fa-solid fa-backward"></i></button> <button id="play-pause-btn"><i class="fa-solid fa-play"></i></button> <button id="forward-btn"><i class="fa-solid fa-forward"></i></button> </div> </div> <i id="toggle-on" class="fa-solid fa-toggle-on toggle-btn"></i> <i id="toggle-off" class="fa-solid fa-toggle-off toggle-btn" style="display: none;"></i> <script src="js.js"></script> </body> </html>
