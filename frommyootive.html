ing */ } .coin.spin { transform: rotateY(720deg); /* Spins the coin */ } #spinBtn { padding: 10px 20px; background-color: #686868; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; transition: background-color 0.3s ease, color 0.3s ease, transform 0.3s ease, border-color 0.3s ease; } #spinBtn:hover { transform: scale(1.05); } #result { margin-top: 20px; font-size: 18px; font-weight: bold; } @media (max-width: 600px) { a { font-size: 18px; padding: 12px 24px; } } #passwordContainer { display: none; text-align: center; margin-top: 50px; z-index: 1; background: black; padding: 132px; position: fixed; height: 100%; width: 100%; } #userPassword { padding: 10px; width: 300px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px; outline: none; transition: border-color 0.3s; } #userPassword:focus { transform: scale(1.05); } #submitBtn { padding: 10px 20px; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: background-color 0.3s; background-color: #283543; } #submitBtn:hover { background-color: #151e27; transform: scale(1.05); } #error-message { color: red; margin-top: 10px; font-size: 14px; text-align: center; } </style> </head> <body> <ul> <p>By Myootive</p><br> <li><a href="https://blackswan19.github.io/bscrop/tabview">Tab View</a></li> <li><a href="https://blackswan19.github.io/Educate/studyroom">Studyroom</a></li> <li><a href="https://blackswan19.github.io/bscrop/M.clofind">Clofind</a></li> <!-- <li><a href="https://blackswan19.github.io/bscrop/imgconver">Imgcnvt</a></li> --> <script src="noright.js"></script> <!-- <li><a href="https://blackswan19.github.io/Educate/Scheduler">Scheduler</a></li> --> <!-- <li><a href="https://blackswan19.github.io/bscrop/imgcrop">BsImgcroper</a></li> --> <!-- <li><a href="https://blackswan19.github.io/bscrop/budget">Mytv - Ibp</a></li> --> <li><a href="https://blackswan19.github.io/b     <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.getElementById('spinBtn').addEventListener('click', function() {
            const coin = document.getElementById('coin');
            const result = document.getElementById('result');
            coin.classList.add('spin');
            setTimeout(() => {
                const isHeads = Math.random() < 0.5;
                coin.classList.remove('spin');
                if (isHeads) {
                    result.textContent = 'You may do'; 
                    coin.style.backgroundColor = 'white';
                    coin.style.color = 'black';
                } else {
                    result.textContent = 'Don\'t do';
                    coin.style.backgroundColor = 'black';
                    coin.style.color = 'white';
                }
            }, 1000);
        });
    </script>
