<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Black Swan - Offer Zone</title><link rel="icon" type="image/x-icon" href="logo.png"><style>body, html {margin: 0;padding: 0;width: 100%;height: 100%;font-family: Arial, sans-serif;display: flex;justify-content: center;align-items: center;background-color: #000000;}*{color: white;}a{text-decoration: none;}.loading-screen, .password-prompt{position: fixed;width: 100%;height: 100%;display: flex;justify-content: center;align-items: center;background-color: #000000;}.loader {border: 16px solid #f3f3f3;border-radius: 50%;border-top: 16px solid #3498db;width: 120px;height: 120px;animation: spin 2s linear infinite;}@keyframes spin {0% { transform: rotate(0deg); }100% { transform: rotate(360deg); }}.password-prompt {display: none;flex-direction: column;align-items: center;}.content {display: none;padding: 20px;font-size: 30px;text-align: center;line-height: 63px;}.content a:hover{color: #3498db;text-decoration: underline;}input{border: solid 1px rgb(23 143 225);padding: 10px 22px;background: #000000;color: rgb(255, 255, 255);outline: none;position: fixed;right: 4%;width: 21%;text-align: center;}button{position: fixed;top: 57%;text-align: center;right: 13%;padding: 8px 25px;outline: none;border: solid 1px rgb(23 143 225);background: rgb(23 143 225);color: white;}.error {color: red;margin-top: 75px;position: fixed;right: 7%;}.password-prompt img{position: fixed;width: 41%;left: 0;}@media only screen and (max-device-width: 480px){.password-prompt img{position: fixed;width: 56%;left: 0;top: 13%;}input {border: solid 1px rgb(23 143 225);padding: 10px 22px;background: #000000;color: rgb(255, 255, 255);outline: none;position: fixed;right: 13%;width: 48%;text-align: center;}}</style></head><body><div class="loading-screen" id="loadingScreen"><div class="loader"></div></div><div class="password-prompt" id="passwordPrompt"><img src="logo.png" alt=""><input type="password" id="passwordInput" placeholder="Enter the pin here..."><button onclick="checkPassword()">Submit</button><div class="error" id="errorMessage"></div></div><div class="content" id="content">Available offer<br><a href="offer1.png">Offer 1</a><br><a href="offer2.png">Offer 2</a><br><a href="offer3.png">Offer 3</a><br></div><script>const correctPasswords=['swanzone','',''];window.addEventListener('load',()=>{const loadingScreen=document.getElementById('loadingScreen');loadingScreen.style.display='none';const passwordPrompt=document.getElementById('passwordPrompt');passwordPrompt.style.display='flex';});function checkPassword(){const passwordInput=document.getElementById('passwordInput').value;const errorMessage=document.getElementById('errorMessage');if(correctPasswords.includes(passwordInput)){const passwordPrompt=document.getElementById('passwordPrompt');passwordPrompt.style.display='none';const content=document.getElementById('content');content.style.display='block';}else{errorMessage.textContent='Incorrect password. Please try again.';}}</script></body></html>
