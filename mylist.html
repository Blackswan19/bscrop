<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image and YouTube Link Storage</title>
    <style>
         @import url('https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@400..700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Great+Vibes&family=Roboto+Slab:wght@100..900&family=Satisfy&family=Shantell+Sans:ital,wght@0,300..800;1,300..800&display=swap'); @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;700&family=Orbitron:wght@400;700&family=Red+Hat+Display:wght@400;900&display=swap'); *{margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; font-family: 'Red Hat Display', sans-serif;}body{font-family: Arial, sans-serif; background-color: #000000; overflow-x: hidden;}h2, h3{color: #333;}.button1{width: 120%; padding: 3px; font-size: 15px; position: relative; right: 25px;}.button1:hover{background-color: red;}input[type="url"], button{padding: 10px; margin: 10px 0; width: 90%; font-size: 16px; border: 1px solid #ccc; border-radius: 5px;}button{background-color: #0041ff; color: white; border: none; cursor: pointer; transition: background-color 0.3s;}.error{color: red; margin-bottom: 10px;}.displayImage{width: 308px; height: 175px; object-fit: contain; cursor: pointer; margin: 10px; border-radius: 5px; transition: transform 0.2s; border: solid 1px #303030; border-radius: 10px;}.displayImage:hover{transform: scale(1.05);}.popup img{width: 720px; height: 404px; object-fit: contain; border-radius: 5px; border: solid 1px black;}.mediaContainer{display: flex; flex-wrap: wrap; gap: 5px; position: relative; padding: 50px;}div#popupActions{width: 50%; position: relative; left: 25%;}.popupOverlay{display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgb(0, 0, 0); justify-content: center; align-items: center; z-index: 1000;}.popup{background-color: #232323; padding: 20px; border-radius: 8px; text-align: center; position: relative; box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);}.popup button{margin: 5px; padding: 10px 20px; border-radius: 5px; border: none; background-color: #0041ff; color: white; cursor: pointer; transition: background-color 0.3s;}.close-btn{background: none; color: white; cursor: pointer; position: absolute; top: 10px; right: 10px; font-size: 15px; text-align: center;}.close-btn button:hover{background-color: black;}.addMoviePopup{display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgb(0 0 0 / 94%); justify-content: center; align-items: center; z-index: 1000;}label{font-size: 18px; font-weight: 600; display: flex; top: 10px; position: relative; left: 6%;}.addMovieContainer{background-color: #0f0f0f; padding: 20px; border-radius: 8px; color: white; text-align: center; box-shadow: 0 0 15px rgba(0, 0, 0, 0.2); width: 35%;}:root{--primary-color: #ffffff; --secondary-color: #bbbbbb; --accent-color: #0041ff; --dark-bg: #1b1b1b; --light-gray: #000000; --deep-shadow: rgba(0, 0, 0, 0.5); --gradient-bg: linear-gradient(to left, #0041ff, #ff0000);}.addMovieContainer button{margin: 5px;}.netflixLogo{font-size: 2rem; font-weight: 900; background: var(--gradient-bg); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}header{background-color: #000000; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; box-shadow: 0 4px 40px var(--deep-shadow); transition: background-color 0.4s ease; border-bottom: solid 1px #0041ff;}h2{margin-top: 150px; color: #0041ff; font-size: 35px; left: 25px; position: relative;}
    </style>
</head>

<body>
    <header> <div class="netflixLogo"> <a id="logo" href="#home">BsWatchin</a> </div><div class="from"> <button type="button" onclick="openAddMoviePopup()" class="button1">Add Movie</button> </div></header> <h2>Your Moives</h2> <div id="displayArea" class="mediaContainer"></div><div id="popupOverlay" class="popupOverlay" onclick="closePopup()"> <div class="popup" onclick="event.stopPropagation()"> <img id="popupImage" src="" alt="Popup Image"> <div id="popupActions"> <button onclick="playVideo()">Play Video</button> <button onclick="deleteMedia()" style="background: red;">Delete</button> </div></div></div><div id="addMovieOverlay" class="addMoviePopup" onclick="closeAddMoviePopup()"> <div class="addMovieContainer" onclick="event.stopPropagation()"> <label for="addImageLink">Paste the image url:</label><br><input type="url" id="addImageLink" required><br><label for="addYoutubeLink">Paste the youtube url:</label><br><input type="url" id="addYoutubeLink" pattern="https?://(www\.)?(youtube\.com|youtu\.be)/.+" required><br><button type="button" onclick="storeMedia()">Add</button> <button class="close-btn" onclick="closeAddMoviePopup()"></button> <div id="addResult" class="error"></div></div></div>
    <script>
        let currentIndex; // To keep track of the current media item being viewed

        // Open Add Movie Popup
        function openAddMoviePopup() {
            document.getElementById("addMovieOverlay").style.display = 'flex';
        }

        // Close Add Movie Popup
        function closeAddMoviePopup() {
            document.getElementById("addMovieOverlay").style.display = 'none';
        }

        // Store multiple media entries in localStorage
        function storeMedia() {
            const youtubeLink = document.getElementById("addYoutubeLink").value;
            const imageUrl = document.getElementById("addImageLink").value;

            if (!youtubeLink || !imageUrl) {
                document.getElementById("addResult").textContent = "Enter a valid image URL and YouTube link.";
                return;
            }

            // Validate YouTube URL
            const regex = /^(https?:\/\/)?(www\.)?(youtube\.com|youtu\.be)\/.+$/;
            if (!regex.test(youtubeLink)) {
                document.getElementById("addResult").textContent = "Enter a valid YouTube link.";
                return;
            }

            // Validate Image URL
            const imageRegex = /\.(jpeg|jpg|gif|png|webp)$/i;
            if (!imageRegex.test(imageUrl)) {
                document.getElementById("addResult").textContent = "Enter a valid image URL.";
                return;
            }

            // Retrieve current media array from localStorage, or initialize if empty
            let storedMedia = JSON.parse(localStorage.getItem("storedMedia")) || [];

            // Add new media (image URL and YouTube link) to the array
            storedMedia.push({
                image: imageUrl,
                link: youtubeLink
            });

            // Store the updated media array in localStorage
            localStorage.setItem("storedMedia", JSON.stringify(storedMedia));

            // Display the updated media
            displayStoredMedia();
            closeAddMoviePopup(); // Close the popup after adding media
        }

        // Display stored media from localStorage
        function displayStoredMedia() {
            const storedMedia = JSON.parse(localStorage.getItem("storedMedia")) || [];

            const displayArea = document.getElementById("displayArea");
            displayArea.innerHTML = ''; // Clear existing content

            storedMedia.forEach((media, index) => {
                const mediaItem = document.createElement("div");
                mediaItem.innerHTML = `
                    <img src="${media.image}" class="displayImage" onclick="openPopup(${index})">
                `;

                displayArea.appendChild(mediaItem);
            });
        }

        // Open the popup to view image and options
        function openPopup(index) {
            currentIndex = index;
            const storedMedia = JSON.parse(localStorage.getItem("storedMedia")) || [];
            const media = storedMedia[currentIndex];
            document.getElementById("popupImage").src = media.image;
            document.getElementById("popupOverlay").style.display = 'flex';
        }

        // Close the popup
        function closePopup() {
            document.getElementById("popupOverlay").style.display = 'none';
        }

        // Modify and play the video when the user clicks the play button
        function playVideo() {
            const storedMedia = JSON.parse(localStorage.getItem("storedMedia")) || [];
            const videoUrl = storedMedia[currentIndex].link;

            const modifiedUrl = modifyLink(videoUrl); // Get the modified URL

            // Open the modified video URL directly in a new tab
            window.open(modifiedUrl, "_self");
            closePopup(); // Close the popup after playing the video
        }

        // Function to modify the YouTube link
        function modifyLink(videoUrl) {
            let modifiedUrl = videoUrl;

            // If the link is from youtu.be
            if (videoUrl.includes("youtu.be")) {
                modifiedUrl = `https://www.yout-ube.com/watch?v=${videoUrl.split("youtu.be/")[1].split("?")[0]}`;
            }
            // If the link is from youtube.com
            else if (videoUrl.includes("youtube.com")) {
                modifiedUrl = videoUrl.replace(/youtube/i, "yout-ube");
            }

            return modifiedUrl; // Return the modified URL
        }

        // Delete the current media item
        function deleteMedia() {
            let storedMedia = JSON.parse(localStorage.getItem("storedMedia")) || [];
            storedMedia.splice(currentIndex, 1); // Remove the selected item
            localStorage.setItem("storedMedia", JSON.stringify(storedMedia)); // Update storage
            displayStoredMedia(); // Refresh display
            closePopup(); // Close the popup
        }

        // Load and display stored media on page load
        window.onload = function () {
            displayStoredMedia();
        };
    </script>

</body>

</html>
