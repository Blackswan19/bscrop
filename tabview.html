<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>M | Tabview</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Oswald|Noto+Sans"> <link rel="icon" type="image/x-icon" href="https://i.ibb.co/sd04n7n4/logo.png"> <style> @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap'); * { -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; scrollbar-width: thin;letter-spacing: 0.3px; scrollbar-color: rgba(255, 255, 255, 0.648) transparent; }body { font-family: "League Spartan", serif; background-color: #151e27; color: white; margin: 0; } body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; } a { text-decoration: none; color: white; } .tab-container { display: flex; flex-direction: column; height: 100vh; } .tab-content h3 { text-align: center; margin: 25px; font-weight: 300; color: #ffffff80; } .tab-header { display: flex; background: transparent; padding: 5px; overflow-x: scroll; border-bottom: 1px solid #ffffff3d; align-items: center; scrollbar-width: none; } .tab { background: transparent; color: white; padding: 8px 13px; margin-right: 5px; cursor: pointer; border-radius: 9999px; text-transform: capitalize; white-space: nowrap; font-size: 15px; font-weight: 300; } .tab:hover{ background-color: #1c2834; } .tab.active { background: #283543; color: white; } .add-tab { background: #555555; color: black; border: none; cursor: pointer; border-radius: 10px; position: sticky; right: 0; font-size: 29px; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; } .add-tab:hover{ background: #555555; } .tab-content { flex: 1; overflow-y: auto; background: transparent; } input{ outline: none; } .file { margin: 20px 0; position: relative; } .file-text { background: #444; padding: 10px; border-radius: 5px; color: white; cursor: pointer; } .context-menu { position: absolute; background: #151e27; color: white; display: none; border: 1px solid #283543; z-index: 100; border-radius: 10px; } .context-menu button { display: block; background: #151e27; color: #ffffff; padding: 10px; width: 100%; text-align: left; cursor: pointer; font-weight: 500; font-size: 15px; border-radius: 10px; } .context-menu button:hover { background: #283543; border-radius: 10px; color: white; } .context-menu button:hover:last-child{ background-color: red; color: white;text-transform: uppercase; } .fullscreen-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 100; } div button { padding: 10px; border: none; color: #ffffffab; border-radius: 30px; cursor: pointer; background: #1c2834; font-size: 14px; font-weight: 400; } div button:hover{ background-color: #151e27; } .fullscreen-modal img, .fullscreen-modal iframe { max-width: 90%; max-height: 90%; } .fullscreen-modal .close-modal { position: absolute; top: 20px; right: 20px; background: transparent; color: #ffffffb3; border: none; cursor: pointer; font-size: 19px; } textarea { width: 100%; min-height: 100px; background: transparent; color: white; border: 1.5px solid #283543; padding: 10px; outline: none; font-family: "League Spartan", serif; font-size: 1.2em; max-width: 850px; border-radius: 10px 10px 10px 0; } textarea:focus{ background: #283543; } .search-container { display: flex; justify-content: center; align-items: center; background: transparent; padding: 10px 5px 5px 5px; } .search-tab, .search-file { background: #151e27; border: 1px solid #283543; color: white; width: 100px; padding: 8px; border-radius: 9999px; margin-right: 5px; font-size: 15px; text-align: center; font-weight: 400; } .search-tab:focus, .search-file:focus{ background-color: #283543; } input.search-tab { outline: none; position: sticky; left: 0; } .mainupldopt { position: sticky; top: 0; z-index: 100; background: #000000; text-align: center; padding: 5px; } .mainupldopt button { font-size: 13px; padding: 6px; } .uploaded-files { padding: 10px; } .search-file { width: 300px; } .file-name-input { background: #151e27; color: white; padding: 8px; border-radius: 10px 10px 0px 0; display: flex; width: fit-content; text-align: center; border: 1px solid #283543; font-size: 14px; font-weight: 200; } .file-name-input:focus{ background: #283543; } .search-popup, .resize-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #151e27; padding: 15px; border: 1px solid #283543; border-radius: 10px; z-index: 20000; box-shadow: 0 0 0 100vh #00000099; font-weight: 200; } .search-popup label, .resize-popup label { display: block; margin: 10px 0; font-family: "League Spartan", serif; } .search-popup button, .resize-popup button { border-radius: 10px; } .search-popup button:hover, .resize-popup button:hover { background: #283543; } .link-container { background: #444; padding: 10px; border-radius: 5px; margin: 10px 0; width: fit-content; } .link-container a { color: #1e90ff; text-decoration: underline; word-break: break-all; } .scroll-up { position: fixed; bottom: 48px; background: #6c6c6c; color: white; border: none; padding: 8px 45px 8px 8px; border-radius: 0px; cursor: pointer; margin-bottom: 10px; z-index: 10; right: -15px; } </style> </head> <body> <div class="tab-container"> <div class="search-container"> <input type="text" class="search-file" placeholder="Search file..."> <button onclick="showSearchPopup()">Search</button> </div> <div class="tab-header"> <input type="text" class="search-tab" placeholder="Search..."> <button class="add-tab"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M790.85-170H640q-12.77 0-21.38-8.62Q610-187.23 610-200t8.62-21.38Q627.23-230 640-230h150.85l-52.54-53.31q-8.31-8.31-8.12-20.57.2-12.27 9.12-21.2 8.31-8.3 20.88-8.3 12.58 0 20.89 8.3l99.38 99.77q10.85 10.85 10.85 25.31 0 14.46-10.85 25.31l-99.77 99.77q-8.31 8.3-20.57 8.42-12.27.11-21.2-8.81-8.3-8.31-8.3-20.69t8.3-20.69L790.85-170ZM450-450v130q0 12.77 8.62 21.38Q467.23-290 480-290t21.38-8.62Q510-307.23 510-320v-130h130q12.77 0 21.38-8.62Q670-467.23 670-480t-8.62-21.38Q652.77-510 640-510H510v-130q0-12.77-8.62-21.38Q492.77-670 480-670t-21.38 8.62Q450-652.77 450-640v130H320q-12.77 0-21.38 8.62Q290-492.77 290-480t8.62 21.38Q307.23-450 320-450h130ZM212.31-140Q182-140 161-161q-21-21-21-51.31v-535.38Q140-778 161-799q21-21 51.31-21h535.38Q778-820 799-799q21 21 21 51.31v282.92q0 15.31-11.89 25.46-11.88 10.16-27.19 7.31-52.77-4.92-100.96 12.27-48.19 17.19-85.34 54.35-36.54 36.53-54.35 85.15-17.81 48.61-12.88 101.15 1.23 15.31-8.12 27.19Q509.92-140 495.23-140H212.31Z"/></svg></button> </div> <div class="tab-content"> <p>Select a tab or create a new one.!</p> </div> </div> <div id="contextMenu" class="context-menu"></div> <div id="fullscreenModal" class="fullscreen-modal"> <button class="close-modal"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-437.85 277.08-234.92q-8.31 8.3-20.89 8.5-12.57.19-21.27-8.5-8.69-8.7-8.69-21.08 0-12.38 8.69-21.08L437.85-480 234.92-682.92q-8.3-8.31-8.5-20.89-.19-12.57 8.5-21.27 8.7-8.69 21.08-8.69 12.38 0 21.08 8.69L480-522.15l202.92-202.93q8.31-8.3 20.89-8.5 12.57-.19 21.27 8.5 8.69 8.7 8.69 21.08 0 12.38-8.69 21.08L522.15-480l202.93 202.92q8.3 8.31 8.5 20.89.19 12.57-8.5 21.27-8.7 8.69-21.08 8.69-12.38 0-21.08-8.69L480-437.85Z"/></svg></button> </div> <div id="searchPopup" class="search-popup"> <p>Search in:</p> <label><input type="radio" name="searchScope" value="current" checked><span>Current Tab</span></label> <label><input type="radio" name="searchScope" value="all"><span>All Tabs</span></label> <button onclick="searchFiles()">Confirm</button> <button onclick="document.getElementById('searchPopup').style.display='none'">Cancel</button> </div> <div id="linkPopup" class="search-popup"> <p>Add Link</p> <input type="text" id="linkTitle" placeholder="Enter link title" style="width: 96%; margin-bottom: 10px; padding: 8px;"> <input type="url" id="linkUrl" placeholder="Enter URL" style="width: 96%; margin-bottom: 10px; padding: 8px;"> <button onclick="saveLink()">Save</button> <button onclick="document.getElementById('linkPopup').style.display='none'">Cancel</button> </div> <div id="resizePopup" class="resize-popup"> <p>Resize Image</p> <input type="number" id="imageWidth" placeholder="Enter width (px)" style="width:96%; margin-bottom: 10px; padding: 8px;"> <button onclick="saveImageWidth(true)">Save for All</button> <button onclick="saveImageWidth(false)">Save for This Image</button> <button onclick="document.getElementById('resizePopup').style.display='none'">Cancel</button> </div> <button style="background: black; border: none; padding: 10px; position: fixed; bottom: 10px; right: 0px;"> <a href="https://blackswan19.github.io/Educate/hider">File explorer</a> </button>
<script>
    const tabHeader = document.querySelector('.tab-header');
    const tabContent = document.querySelector('.tab-content');
    const addTabButton = document.querySelector('.add-tab');
    const contextMenu = document.getElementById('contextMenu');
    const fullscreenModal = document.getElementById('fullscreenModal');
    const closeModalButton = fullscreenModal.querySelector('.close-modal');
    const searchTabInput = document.querySelector('.search-tab');
    const searchFileInput = document.querySelector('.search-file');
    const searchPopup = document.getElementById('searchPopup');
    const linkPopup = document.getElementById('linkPopup');
    const linkTitleInput = document.getElementById('linkTitle');
    const linkUrlInput = document.getElementById('linkUrl');
    const resizePopup = document.getElementById('resizePopup');
    const imageWidthInput = document.getElementById('imageWidth');
    let currentTabIndex = 0;
    let currentTabId = null;
    let currentImageTabId = null;
    let currentImageIndex = null;
    const tabsData = JSON.parse(localStorage.getItem('tabsData')) || {};
    let globalImageWidth = localStorage.getItem('globalImageWidth') || '60%';

    const saveTabsData = () => {
      localStorage.setItem('tabsData', JSON.stringify(tabsData));
    };

    const createFileElement = (file, tabId, fileIndex) => {
      const fileContainer = document.createElement('div');
      fileContainer.classList.add('file');
      fileContainer.dataset.fileName = file.name || `file-${fileIndex}`;

      if (file.type === 'image') {
        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.classList.add('file-name-input');
        nameInput.value = file.name || `image-${fileIndex}`;
        nameInput.addEventListener('input', () => {
          tabsData[tabId].files[fileIndex].name = nameInput.value.trim();
          fileContainer.dataset.fileName = nameInput.value.trim() || `file-${fileIndex}`;
          saveTabsData();
        });
        fileContainer.appendChild(nameInput);

        const img = document.createElement('img');
        img.src = file.content;
        img.style.width = file.width || globalImageWidth;
        img.style.height = 'auto';
        img.addEventListener('contextmenu', (e) => showFileContextMenu(e, file, tabId, fileIndex));
        fileContainer.appendChild(img);
      } else if (file.type === 'pdf') {
        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.classList.add('file-name-input');
        nameInput.value = file.name || `pdf-${fileIndex}`;
        nameInput.addEventListener('input', () => {
          tabsData[tabId].files[fileIndex].name = nameInput.value.trim();
          fileContainer.dataset.fileName = nameInput.value.trim() || `file-${fileIndex}`;
          saveTabsData();
        });
        fileContainer.appendChild(nameInput);

        const iframe = document.createElement('iframe');
        iframe.src = file.content;
        iframe.style.width = '100%';
        iframe.style.height = '100vh';
        iframe.addEventListener('contextmenu', (e) => showFileContextMenu(e, file, tabId, fileIndex));
        fileContainer.appendChild(iframe);
      } else if (file.type === 'link') {
        const linkContainer = document.createElement('div');
        linkContainer.classList.add('link-container');
        linkContainer.innerHTML = `
          <p style="margin: 0; font-weight: bold;">${file.title}</p>
          <a href="${file.content}" target="_blank">${file.content}</a>
        `;
        linkContainer.addEventListener('contextmenu', (e) => showFileContextMenu(e, file, tabId, fileIndex));
        fileContainer.appendChild(linkContainer);
      } else if (file.type === 'text') {
        const textArea = document.createElement('textarea');
        textArea.value = file.content;
        textArea.addEventListener('input', () => {
          tabsData[tabId].files[fileIndex].content = textArea.value;
          saveTabsData();
        });
        textArea.addEventListener('contextmenu', (e) => showFileContextMenu(e, file, tabId, fileIndex));
        fileContainer.appendChild(textArea);
      }

      const deleteButton = document.createElement('button');
      deleteButton.textContent = 'DELETE';
      deleteButton.style.display = 'block';
      deleteButton.style.marginTop = '-3px';
      deleteButton.style.padding = '5px 10px';
      deleteButton.style.backgroundColor = 'red';
      deleteButton.style.color = 'white';
      deleteButton.style.fontSize = '15px';
      deleteButton.style.border = 'none';
      deleteButton.style.borderRadius = '0px 0px 10px 10px';
      deleteButton.style.cursor = 'pointer';
      deleteButton.addEventListener('click', () => {
        if (confirm(`Are you sure you want to delete this ${file.type}?`)) {
          tabsData[tabId].files.splice(fileIndex, 1);
          saveTabsData();
          displayTabContent(tabId);
        }
      });
      fileContainer.appendChild(deleteButton);

      return fileContainer;
    };

    const showFileContextMenu = (e, file, tabId, fileIndex) => {
      e.preventDefault();
      contextMenu.innerHTML = '';
      contextMenu.style.left = `${e.pageX}px`;
      contextMenu.style.top = `${e.pageY}px`;
      contextMenu.style.display = 'block';

      if (file.type === 'image') {
        const fullscreenButton = document.createElement('button');
        fullscreenButton.textContent = 'Open in Fullscreen';
        fullscreenButton.addEventListener('click', () => {
          fullscreenModal.style.display = 'flex';
          fullscreenModal.innerHTML = `
            <button class="close-modal"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-437.85 277.08-234.92q-8.31 8.3-20.89 8.5-12.57.19-21.27-8.5-8.69-8.7-8.69-21.08 0-12.38 8.69-21.08L437.85-480 234.92-682.92q-8.3-8.31-8.5-20.89-.19-12.57 8.5-21.27 8.7-8.69 21.08-8.69 12.38 0 21.08 8.69L480-522.15l202.92-202.93q8.31-8.3 20.89-8.5 12.57-.19 21.27 8.5 8.69 8.7 8.69 21.08 0 12.38-8.69 21.08L522.15-480l202.93 202.92q8.3 8.31 8.5 20.89.19 12.57-8.5 21.27-8.7 8.69-21.08 8.69-12.38 0-21.08-8.69L480-437.85Z"/></svg></button>
            <img src="${file.content}" style="max-width: 90%; max-height: 90%;">
          `;
          document.querySelector('.close-modal').addEventListener('click', () => {
            fullscreenModal.style.display = 'none';
          });
        });
        contextMenu.appendChild(fullscreenButton);

        const resizeButton = document.createElement('button');
        resizeButton.textContent = 'Resize Image';
        resizeButton.addEventListener('click', () => {
          currentImageTabId = tabId;
          currentImageIndex = fileIndex;
          imageWidthInput.value = '';
          resizePopup.style.display = 'block';
          contextMenu.style.display = 'none';
        });
        contextMenu.appendChild(resizeButton);
      } else if (file.type === 'pdf') {
        const fullscreenButton = document.createElement('button');
        fullscreenButton.textContent = 'Open in Fullscreen';
        fullscreenButton.addEventListener('click', () => {
          fullscreenModal.style.display = 'flex';
          fullscreenModal.innerHTML = `
            <button class="close-modal">&times;</button>
            <iframe src="${file.content}" style="max-width: 90%; max-height: 90%;"></iframe>
          `;
          document.querySelector('.close-modal').addEventListener('click', () => {
            fullscreenModal.style.display = 'none';
          });
        });
        contextMenu.appendChild(fullscreenButton);
      }

      const deleteButton = document.createElement('button');
      deleteButton.textContent = 'Delete';
      deleteButton.addEventListener('click', () => {
        if (confirm(`Are you sure you want to delete this ${file.type}?`)) {
          tabsData[tabId].files.splice(fileIndex, 1);
          saveTabsData();
          displayTabContent(tabId);
        }
        contextMenu.style.display = 'none';
      });
      contextMenu.appendChild(deleteButton);
    };

    const showTabContextMenu = (e, tabId, tabElement) => {
      e.preventDefault();
      contextMenu.style.left = `${e.pageX}px`;
      contextMenu.style.top = `${e.pageY}px`;
      contextMenu.innerHTML = '';

      const renameButton = document.createElement('button');
      renameButton.textContent = 'Rename Tab';
      renameButton.addEventListener('click', () => {
        const newName = prompt('Enter new tab name:', tabsData[tabId].name);
        if (newName) {
          tabsData[tabId].name = newName;
          saveTabsData();
          tabElement.textContent = newName;
        }
        contextMenu.style.display = 'none';
      });
      contextMenu.appendChild(renameButton);

      const closeButton = document.createElement('button');
      closeButton.textContent = 'Delete Tab';
      closeButton.addEventListener('click', () => {
        if (confirm('Are you sure you want to close this tab?')) {
          delete tabsData[tabId];
          saveTabsData();
          tabElement.remove();
          if (Object.keys(tabsData).length > 0) {
            document.querySelector('.tab').click();
          } else {
            tabContent.innerHTML = '<p>Select a tab or create a new one!</p>';
          }
        }
        contextMenu.style.display = 'none';
      });
      contextMenu.appendChild(closeButton);

      contextMenu.style.display = 'block';
    };

    const createTabElement = (tabId, tabName) => {
      const tab = document.createElement('div');
      tab.classList.add('tab');
      tab.textContent = tabName;
      tab.dataset.tabId = tabId;

      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTabIndex = Array.from(tabHeader.children).indexOf(tab) - 2;
        currentTabId = tabId;
        displayTabContent(tabId);
      });

      tab.addEventListener('contextmenu', (e) => showTabContextMenu(e, tabId, tab));
      return tab;
    };

    const displayTabContent = (tabId) => {
      const tabData = tabsData[tabId];
      if (!tabData) return;

      tabContent.innerHTML = `
        <button class="scroll-up" onclick="document.querySelector('.tab-content').scrollTo({top: 0, behavior: 'smooth'})">Scroll Up</button>
        <div class="mainupldopt">
          <button onclick="uploadFile('${tabId}', 'image')">Upload Image</button>
          <button onclick="uploadFile('${tabId}', 'pdf')">Upload PDF</button>
          <button onclick="showLinkPopup('${tabId}')">Add Link</button>
          <button onclick="addTextArea('${tabId}')">Add Text</button>
        </div>
        <div class="uploaded-files"></div>
      `;

      const uploadedFilesContainer = tabContent.querySelector('.uploaded-files');
      for (let index = tabData.files.length - 1; index >= 0; index--) {
        const file = tabData.files[index];
        const fileElement = createFileElement(file, tabId, index);
        uploadedFilesContainer.prepend(fileElement);
      }
    };

    const uploadFile = (tabId, fileType) => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = fileType === 'image' ? 'image/*' : 'application/pdf';
      input.multiple = true;

      input.addEventListener('change', (event) => {
        const files = event.target.files;
        if (!files || files.length === 0) return;

        Array.from(files).forEach(file => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const content = e.target.result;
            const newFile = { type: fileType, content, name: file.name, width: globalImageWidth };
            tabsData[tabId].files.unshift(newFile);
            saveTabsData();
            displayTabContent(tabId);
          };
          reader.onerror = () => alert(`Error reading file: ${file.name}`);
          reader.readAsDataURL(file);
        });
      });

      input.click();
    };

    const addTextArea = (tabId) => {
      const newFile = { type: 'text', content: '', name: `text-${Date.now()}` };
      tabsData[tabId].files.unshift(newFile);
      saveTabsData();
      displayTabContent(tabId);
    };

    const showLinkPopup = (tabId) => {
      currentTabId = tabId;
      linkTitleInput.value = '';
      linkUrlInput.value = '';
      linkPopup.style.display = 'block';
    };

    const saveLink = () => {
      const title = linkTitleInput.value.trim();
      const url = linkUrlInput.value.trim();
      if (!title || !url) {
        alert('Enter both a title and a URL.');
        return;
      }
      if (!url.match(/^https?:\/\//)) {
        alert('Enter a valid URL starting with http:// or https://');
        return;
      }
      const newFile = { type: 'link', content: url, name: title, title };
      tabsData[currentTabId].files.unshift(newFile);
      saveTabsData();
      displayTabContent(currentTabId);
      linkPopup.style.display = 'none';
    };

    const saveImageWidth = (applyToAll) => {
      const width = imageWidthInput.value.trim();
      if (!width || isNaN(width) || width <= 0) {
        alert('Enter a valid width in pixels.');
        return;
      }

      const widthValue = `${width}px`;
      if (applyToAll) {
        globalImageWidth = widthValue;
        localStorage.setItem('globalImageWidth', globalImageWidth);
        Object.values(tabsData).forEach(tab => {
          tab.files.forEach(file => {
            if (file.type === 'image') {
              delete file.width;
            }
          });
        });
      } else {
        tabsData[currentImageTabId].files[currentImageIndex].width = widthValue;
      }

      saveTabsData();
      displayTabContent(currentTabId);
      resizePopup.style.display = 'none';
    };

    const searchTabs = () => {
      const searchTerm = searchTabInput.value.toLowerCase();
      document.querySelectorAll('.tab').forEach(tab => {
        const tabName = tab.textContent.toLowerCase();
        tab.style.display = tabName.includes(searchTerm) ? 'block' : 'none';
      });
    };

    const showSearchPopup = () => {
      if (searchFileInput.value.trim()) {
        searchPopup.style.display = 'block';
      }
    };

    const searchFiles = () => {
      const searchTerm = searchFileInput.value.toLowerCase();
      if (!searchTerm) return;

      const scope = document.querySelector('input[name="searchScope"]:checked').value;
      searchPopup.style.display = 'none';

      let tabsToSearch = scope === 'current' 
        ? [document.querySelector('.tab.active')?.dataset.tabId]
        : Object.keys(tabsData);

      tabsToSearch = tabsToSearch.filter(tabId => tabId);

      const results = [];
      tabsToSearch.forEach(tabId => {
        const tabData = tabsData[tabId];
        tabData.files.forEach((file, index) => {
          const fileName = file.name?.toLowerCase() || '';
          const fileContent = file.type === 'text' ? file.content.toLowerCase() : '';
          if (fileName.includes(searchTerm) || fileContent.includes(searchTerm)) {
            results.unshift({ tabId, tabName: tabData.name, file, fileIndex: index });
          }
        });
      });

      tabContent.innerHTML = `
        <h3>Search Results:</h3>
        ${results.length === 0 ? '<p>No files found.</p>' : ''}
        <div class="search-results"></div>
      `;

      const resultsContainer = tabContent.querySelector('.search-results');
      results.forEach(result => {
        const resultElement = document.createElement('div');
        resultElement.style.margin = '10px';
        resultElement.innerHTML = `
          <p>Tab: ${result.tabName}</p>
        `;
        const fileElement = createFileElement(result.file, result.tabId, result.fileIndex);
        resultElement.appendChild(fileElement);
        resultsContainer.prepend(resultElement);
      });
    };

    const addTab = () => {
      const tabId = `tab-${Date.now()}`;
      const tabName = `Tab ${Object.keys(tabsData).length + 1}`;
      tabsData[tabId] = { name: tabName, files: [] };
      saveTabsData();

      const tab = createTabElement(tabId, tabName);
      const searchTabInput = tabHeader.querySelector('.search-tab');
      if (tabHeader.children.length > 1) {
        tabHeader.insertBefore(tab, tabHeader.children[1]);
      } else {
        tabHeader.insertBefore(tab, addTabButton);
      }
      tab.click();
    };

    const loadTabs = () => {
      const tabEntries = Object.entries(tabsData).reverse();
      tabEntries.forEach(([tabId, tabInfo]) => {
        const tab = createTabElement(tabId, tabInfo.name);
        const searchTabInput = tabHeader.querySelector('.search-tab');
        if (tabHeader.children.length > 1) {
          tabHeader.insertBefore(tab, tabHeader.children[1]);
        } else {
          tabHeader.insertBefore(tab, addTabButton);
        }
      });

      if (Object.keys(tabsData).length > 0) {
        document.querySelector('.tab').click();
      }
    };

    document.addEventListener('click', () => {
      contextMenu.style.display = 'none';
    });

    searchTabInput.addEventListener('input', searchTabs);
    addTabButton.addEventListener('click', addTab);
    closeModalButton.addEventListener('click', () => {
      fullscreenModal.style.display = 'none';
    });

    loadTabs();
     document.addEventListener("DOMContentLoaded", () => {
            const customMenu = document.querySelector(".custom-menu");

            document.addEventListener("contextmenu", (event) => {
                event.preventDefault();
                if (customMenu) {
                    customMenu.style.display = "block";
                    customMenu.style.top = `${event.pageY}px`;
                    customMenu.style.left = `${event.pageX}px`;
                }
            });

            document.addEventListener("click", () => {
                if (customMenu) {
                    customMenu.style.display = "none";
                }
            });
        });
  </script>
</body>
</html>
