<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV</title>
    <link rel="icon" type="image/x-icon" href="https://cdn.dribbble.com/users/2007778/screenshots/17173384/media/9c919d97c8b32452ba06e182255cd9df.jpg?resize=400x300&vertical=center">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap');
        body {
            font-family: "Roboto Slab", serif;
            background-color: black;
        }
        *{
            color: white;
        }
        .title {
            font-size: 74px;
        }
        .image-container {
            margin-top: 20px;
        }
        .copyright {
            font-size: 11px;
            position: fixed;
            bottom: 1%;
        }
        input ,button{
            color: black;
        }
        img {
            width: 38%;
    position: fixed;
    right: 20%;
    bottom: 10%;
        }
        a{
            text-decoration: none;
    color: rgb(255, 255, 255);
    position: fixed;
    top: 0%;
    right: 0.5%;
        }
        @media screen and (max-width: 480px) {
            img{
                width: 62%;
                bottom: 8%;
            };
            
        }
    </style>
</head>
<body>
    <div class="title">
        Sv
        <p style="line-height: 0; font-size: 15px;">Offers</p>
    </div>
    <hr>
    <div class="offers">
        <p>100 - 200</p>
        <p>200 - 400</p>
        <p>300 - 600</p>
        <p>400 - 800</p>
        <p>500 - 1000</p>
    </div>
    <div class="inputs">
        <input type="text" id="name" placeholder="Enter your amount">
        <button id="submit">Submit</button>
    </div>
    <hr>
    <div class="image-container" id="image-container">
        <!-- Image will be inserted here -->
    </div>
    <script>
        document.getElementById('submit').addEventListener('click', function(event) {
            event.preventDefault(); 
            var name = document.getElementById('name').value;
            var amount = parseInt(name, 10);

            if (isNaN(amount)) {
                alert("Please enter a valid amount.");
            } else if (amount >= 100 && amount <= 500) {
                alert("Payment amount: " + amount);
                insertImage();
            } else {
                alert("Offer Limit is 500!");
            }
        });

        function insertImage() {
            var img = document.createElement('img');
            img.src = 'https://i.ibb.co/bXQh6Pd/Whats-App-Image-2024-06-11-at-22-25-07-de881164.jpg'; // Replace with your image URL
            img.alt = 'Payment Confirmation';
            document.getElementById('image-container').appendChild(img);
        }
    </script>
    <div class="copyright">
        ⓒCopyrights goes to DTT
    </div>
</body>
</html>
