0%); color:white; border:none;">Cancel</button> <button onclick="applyCroppedBackground()" style="flex:1; padding:12px; border-radius:14px; background:#0071e3; color:white; border:none;">Set as Background</button> </div> </div> <div class="popup" id="addSitePopup"> <div style="font-size:25px; font-weight:600; text-align:center; margin-bottom:16px;">Add Site</div> <input type="text" id="siteTitle" class="popup-input" placeholder="Title" style="margin-bottom:12px;"> <input type="text" id="siteURL" class="popup-input" placeholder="https://example.com"> <div style="display:flex; gap:10px; margin-top:20px;"> <button onclick="hideAddPopup()" style="flex: 1; padding: 12px; border-radius: 14px; background: rgb(0 0 0 / 46%); color: white; border: none;font-weight: 200; font-size: 15px;">Cancel</button> <button onclick="saveNewSite()" style=" flex: 1; padding: 12px; border-radius: 14px; background: #0006ff; color: white; border: none; font-weight: 200; font-size: 15px;">Add</button> </div> </div> <!-- Recommended BG Popup --> <div class="popup" id="bgPopup" style="width:92%; max-width:680px;"> <div style="font-size:18px; font-weight:600; text-align:center; margin-bottom:16px;">Choose Wallpaper</div> <div id="bgGrid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(130px,1fr)); gap:12px; max-height:420px; overflow-y:auto; padding:8px 0;"></div> <button onclick="hideBGPpopup()" style=" margin-top: 16px; width: 100%; padding: 5px; border-radius: 32px; background: rgb(255 255 255 / 35%); color: white; border: none; font-size: 14px;">Close Now</button> </div>
<script>
    let isTimerMode = false;
    let timerInterval, timeLeft = 25*60, isRunning = false;
    let notes = [];
    let currentNoteIndex = 0;
    let showSeconds = true;
    let use24Hour = true;
    function loadAllData() {
      document.getElementById('fontFamily').value = localStorage.getItem('fontFamily') || 'system-ui';
      document.getElementById('fontWeight').value = localStorage.getItem('fontWeight') || '300';
      document.getElementById('fontStyle').value = localStorage.getItem('fontStyle') || 'normal';
      document.getElementById('timeFormat').value = localStorage.getItem('timeFormat') || '24';
      document.getElementById('showSeconds').value = localStorage.getItem('showSeconds') || 'true';
      document.getElementById('bgColor').value = localStorage.getItem('bgColor') || '#0a0a1f';
      document.getElementById('fontColor').value = localStorage.getItem('fontColor') || '#ffffff';
      document.getElementById('glassOpacity').value = localStorage.getItem('glassOpacity') || '0.07';

      use24Hour = document.getElementById('timeFormat').value === '24';
      showSeconds = document.getElementById('showSeconds').value === 'true';

      const savedNotes = localStorage.getItem('notes');
      notes = savedNotes ? JSON.parse(savedNotes) : [{ text: "Welcome! You can write quick notes here." }];
      currentNoteIndex = 0;

      applyPreferences();
      renderCurrentNote();
    }

    function applyPreferences() {
      const family = document.getElementById('fontFamily').value;
      const weight = document.getElementById('fontWeight').value;
      const style = document.getElementById('fontStyle').value;
      const bg = document.getElementById('bgColor').value;
      const color = document.getElementById('fontColor').value;
      const opacity = document.getElementById('glassOpacity').value;
      document.getElementById('fullscreen').style.background = bg;
      document.querySelector('.main-content').style.background = `rgba(255,255,255,${opacity})`;
      document.querySelector('.note-slider').style.background = `rgba(255,255,255,${opacity * 0.85})`;
      const allTextElements = document.querySelectorAll(
        '.time-display, .timer-display, .date-display, .note-text, .note-controls, .control-btn, label, span, .top-bar, .settings-panel, h3, .close-btn'
      );
      allTextElements.forEach(el => el.style.color = color);
      const deleteBtn = document.querySelector('button[onclick="deleteCurrentNote()"]');
      if (deleteBtn) deleteBtn.style.color = '#ff6666';
      document.querySelectorAll('.time-display, .timer-display, .date-display').forEach(el => {
        el.style.fontFamily = family;
        el.style.fontWeight = weight;
        el.style.fontStyle = style;
      });
      document.getElementById('date').style.fontFamily = family;
      localStorage.setItem('fontFamily', family);
      localStorage.setItem('fontWeight', weight);
      localStorage.setItem('fontStyle', style);
      localStorage.setItem('timeFormat', use24Hour ? '24' : '12');
      localStorage.setItem('showSeconds', showSeconds);
      localStorage.setItem('bgColor', bg);
      localStorage.setItem('fontColor', color);
      localStorage.setItem('glassOpacity', opacity);
    }

    function updateSmallTime() {
      const now = new Date();
      const options = { hour12: !use24Hour, hour: '2-digit', minute: '2-digit' };
      if (showSeconds) options.second = '2-digit';
      document.getElementById('smallTime').textContent = now.toLocaleTimeString('en-US', options);
    }

    function updateBigClock() {
      const now = new Date();
      const options = { hour12: !use24Hour, hour: '2-digit', minute: '2-digit' };
      if (showSeconds) options.second = '2-digit';
      document.getElementById('bigTime').textContent = now.toLocaleTimeString('en-US', options);

      document.getElementById('date').textContent = now.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function updateTimerDisplay() {
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      document.getElementById('timerDisplay').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function startTimer() {
      if (isRunning) return;
      if (timeLeft === 0) timeLeft = parseInt(document.getElementById('minutesInput').value || 25) * 60;
      isRunning = true;
      timerInterval = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          updateTimerDisplay();
        } else {
          clearInterval(timerInterval);
          isRunning = false;
          alert("🎉 Time's Up!");
        }
      }, 1000);
    }

    function pauseTimer() { 
      clearInterval(timerInterval); 
      isRunning = false; 
    }

    function resetTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      timeLeft = parseInt(document.getElementById('minutesInput').value || 25) * 60;
      updateTimerDisplay();
    }

    function toggleMode() {
      isTimerMode = !isTimerMode;
      document.getElementById('clockMode').style.display = isTimerMode ? 'none' : 'block';
      document.getElementById('timerMode').style.display = isTimerMode ? 'block' : 'none';
      document.getElementById('modeBtn').innerHTML = isTimerMode 
        ? '<i class="fa-solid fa-clock"></i> Clock' 
        : '<i class="fa-solid fa-hourglass"></i> Timer';
    }

    function renderCurrentNote() {
      document.getElementById('currentNote').textContent = notes[currentNoteIndex].text || '';
      document.getElementById('noteCounter').textContent = `${currentNoteIndex + 1} / ${notes.length}`;
    }

    function saveCurrentNote() {
      notes[currentNoteIndex].text = document.getElementById('currentNote').textContent.trim();
      localStorage.setItem('notes', JSON.stringify(notes));
    }

    function addNewNote() {
      notes.push({ text: "New note..." });
      currentNoteIndex = notes.length - 1;
      renderCurrentNote();
      localStorage.setItem('notes', JSON.stringify(notes));
    }

    function deleteCurrentNote() {
      if (notes.length <= 1) return alert("Cannot delete the last note.");
      notes.splice(currentNoteIndex, 1);
      if (currentNoteIndex >= notes.length) currentNoteIndex = notes.length - 1;
      renderCurrentNote();
      localStorage.setItem('notes', JSON.stringify(notes));
    }

    function prevNote() {
      currentNoteIndex = (currentNoteIndex - 1 + notes.length) % notes.length;
      renderCurrentNote();
    }

    function nextNote() {
      currentNoteIndex = (currentNoteIndex + 1) % notes.length;
      renderCurrentNote();
    }

    function openSettings() {
      document.getElementById('settingsPanel').classList.add('show');
    }

    function closeSettings() {
      use24Hour = document.getElementById('timeFormat').value === '24';
      showSeconds = document.getElementById('showSeconds').value === 'true';
      applyPreferences();
      document.getElementById('settingsPanel').classList.remove('show');
    }
    document.getElementById('topTime').addEventListener('click', () => {
      document.getElementById('fullscreen').classList.add('show');
      if (isTimerMode) toggleMode();
    });

    document.getElementById('bigTime').addEventListener('click', () => {
      document.getElementById('fullscreen').classList.remove('show');
    });

    document.getElementById('settingsIcon').addEventListener('click', openSettings);
    document.querySelectorAll('#fontFamily, #fontWeight, #fontStyle, #timeFormat, #showSeconds, #bgColor, #fontColor, #glassOpacity').forEach(el => {
      el.addEventListener('change', applyPreferences);
      if (el.type === 'color' || el.type === 'range') {
        el.addEventListener('input', applyPreferences);
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === "Escape") {
        document.getElementById('fullscreen').classList.remove('show');
        document.getElementById('settingsPanel').classList.remove('show');
      }
    });
    function init() {
      loadAllData();
      updateSmallTime();
      updateBigClock();
      updateTimerDisplay();

      setInterval(() => {
        updateSmallTime();
        if (!isTimerMode) updateBigClock();
      }, 1000);
    }

    window.onload = init;
    const links = {
      6: "https://blackswan19.github.io/bscrop/bsaducut",
      5: "https://blackswan19.github.io/Educate/savelink",
      3: "https://blackswan19.github.io/bscrop/imgconver",
      4: "https://blackswan19.github.io/bscrop/watchin/main",
      2: "https://blackswan19.github.io/bscrop/bsweb",
      7: "https://blackswan19.github.io/Educate/stoper",
      8: "https://blackswan19.github.io/Educate/hider",
      9: "https://blackswan19.github.io/Educate/bookpad",
      10: "https://blackswan19.github.io/Educate/filexplorer",
      11: "https://blackswan19.github.io/bscrop/watchin/mylist",
      1: "https://blackswan19.github.io/Educate/savenotes",
      14: "https://blackswan19.github.io/bsfesta/minifesta",
      12: "https://blackswan19.github.io/Educate/password",
      15: "https://blackswan19.github.io/bscrop/imgediter",
      16: "https://blackswan19.github.io/Educate/room",
      17: "https://blackswan19.github.io/bsfesta/music",
      18: "https://blackswan19.github.io/Educate/texter",
      19: "https://blackswan19.github.io/Educate/bpdownload",
      20: "https://blackswan19.github.io/Educate/room",
    };

    function openLink(num) {
      if (links[num]) {
        window.open(links[num], "_self");
      }
    }

    const countryTimeZones = {
      'India': 'Asia/Kolkata',
      'Korea': 'Asia/Seoul',
      'China': 'Asia/Shanghai',
      'Australia': 'Australia/Sydney',
      'France': 'Europe/Paris',
      'USA': 'America/New_York',
    };

    function openPopup() {
      const container = document.getElementById('popupContainer');
      const list = document.getElementById('countryList');
      if (!list || !container) return;

      list.innerHTML = '';
      for (const c in countryTimeZones) {
        const li = document.createElement('li');
        li.textContent = c;
        li.onclick = () => {
          const time = new Intl.DateTimeFormat('en-US', {
            timeZone: countryTimeZones[c],
            hour: 'numeric',
            minute: 'numeric',
            hour12: true
          }).format(new Date());
          li.textContent = `${c} time now: ${time}`;
          li.style.cursor = 'default';
          li.onclick = null;
        };
        list.appendChild(li);
      }
      container.classList.add('visible');
    }

    function closePopup() {
      const container = document.getElementById('popupContainer');
      if (container) container.classList.remove('visible');
    }

    function openPrivacyPopup() {
      const popup = document.getElementById('privacyPopup');
      if (popup) popup.classList.add('visible');
    }
    function closePrivacyPopup() {
      const popup = document.getElementById('privacyPopup');
      if (popup) popup.classList.remove('visible');
    }

    function BusinessPopup() {
      const popup = document.getElementById('businessPopup');
      if (popup) popup.classList.add('visible');
    }

    function closeBusinessPopup() {
      const popup = document.getElementById('businessPopup');
      if (popup) popup.classList.remove('visible');
    }
</script>
