<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BsTimer</title>
    <link rel="icon" type="image/x-icon" href="https://yt3.ggpht.com/OZFVaDkpsH5Zc0m0ssBCNsQYBzcjCtTDWey5h4tQBD8bjbASKAR1-Yi_i0vJAyRPoE2NdeyKPo8=s176-c-k-c0x00ffffff-no-rj-mo">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Orbitron:wght@400..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Strait&display=swap');*{color: rgb(177 177 177);font-family: "Red Hat Display", sans-serif;}body{display: flex;justify-content: center;align-items: center;height: 100vh;margin: 0;background-color: #000000;background-size: cover;background-position: center; background-repeat: no-repeat;}.timer-container{display: block;justify-content: center;align-items: center;color: #000000;padding: 20px;flex-direction: column;width: 45%;}.timer-display{font-size: 150px;color: #e4e4e4af;margin-bottom: 20px;font-weight: 100;font-family: Arial, sans-serif;}.timer-button{padding: 8px 16px;border-radius: 8px;background-color: #00000000;color: white;border: none;cursor: pointer;font-size: 14px;margin: 5px;}.timer-button:hover{background-color: #000a36;}.timer-button:active{background-color: #004085;}/* Modal Styles */.modal{display: none;position: fixed;z-index: 1;left: 0;top: 0;width: 100%;height: 100%;background-color: rgba(0, 0, 0, 0.5);justify-content: center;align-items: center;}.modal-content{background-color: #f4f4f4;padding: 20px;border-radius: 10px;text-align: center;width: 300px;}.modal-content input{margin: 10px 0;width: 100%;}.close-button{color: #aaa;float: right;font-size: 28px;font-weight: bold;cursor: pointer;}.close-button:hover,.close-button:focus{color: #000;text-decoration: none;cursor: pointer;}@media (max-width : 480px){.timer-display{left: 0px; position: fixed; font-size: 80px; text-align: center; width: 100%; top: 25%;}div#timer-container{position: relative; left: -12%;}}
    </style>
</head>
<body>
    <div class="timer-container" id="timer-container"> <div class="timer-display" id="timer-display">00:00:00</div><button class="timer-button" onclick="startTimer()">Start</button> <button class="timer-button" onclick="stopTimer()">Stop</button> <button class="timer-button" onclick="resetTimer()">Reset</button> </div><button class="timer-button" onclick="toggleFullscreen()"> <i class="fa-solid fa-expand"></i> </button> <div> <button onclick="toggleUploadOptions()" style=" padding: 10px; border-radius: 0px; outline: none; border: none; background: #080808c9; color: white; position: fixed; left: 0px; top: 0px;">Change Bg</button> </div><div id="uploadOptions" style="position: fixed; top: 50px; left: 11px; background-color: #08080859; padding: 10px; border: 1px solid rgb(204, 204, 204); z-index: 10; border-radius: 10px; display: none;"> <button style="padding: 6px;background-color: #000;outline: none;border: none;" onclick="document.getElementById('uploadImage').click()">Upload a File</button> <input type="file" id="uploadImage" accept="image/*" onchange="setBackground(event)" style="display: none;"> <div style="margin-top: 10px;"> <input type="text" id="imageUrlInput" style="padding: 5px 15px;outline: none;" placeholder="Enter image URL"/> <button onclick="setImageUrl()" style="background-color: #000000; border: none; outline: none; padding: 7px 22px; border-radius: 2px;">Set Bg</button> </div></div>
    <script>
        let timer;
        let seconds = 0;
        let isRunning = false;

        function formatTime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            document.getElementById('timer-display').textContent = formatTime(seconds);
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                timer = setInterval(() => {
                    seconds++;
                    updateDisplay();
                }, 1000);
            }
        }

        function stopTimer() {
            clearInterval(timer);
            isRunning = false;
        }

        function resetTimer() {
            clearInterval(timer);
            seconds = 0;
            isRunning = false;
            updateDisplay();
        }

        function toggleFullscreen() {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) { // Safari
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) { // IE11
                    elem.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { // Safari
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { // IE11
                    document.msExitFullscreen();
                }
            }
        }

        function toggleUploadOptions() {
            const uploadOptions = document.getElementById('uploadOptions');
            if (uploadOptions.style.display === 'none' || uploadOptions.style.display === '') {
                uploadOptions.style.display = 'block';
            } else {
                uploadOptions.style.display = 'none';
            }
        }

        function setImageUrl() {
            const imageUrl = document.getElementById('imageUrlInput').value;
            if (imageUrl) {
                document.body.style.backgroundImage = `url(${imageUrl})`;
                document.body.style.backgroundSize = "cover";
                localStorage.setItem('backgroundImage', imageUrl);
            }
        }

        function setBackground(event) {
            const file = event.target.files[0];
            const reader = new FileReader();

            reader.onload = function (e) {
                const mediaUrl = e.target.result;
                document.body.style.backgroundImage = `url(${mediaUrl})`;
                document.body.style.backgroundSize = "cover";
                localStorage.setItem('backgroundImage', mediaUrl);
            };

            if (file) {
                reader.readAsDataURL(file);
            }
        }

        window.onload = function () {
        const savedBg = localStorage.getItem('backgroundImage');
        const defaultBg = "https://images.unsplash.com/photo-1678497180488-d0f1cf12e61c?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D";

        if (savedBg) {
            document.body.style.backgroundImage = `url(${savedBg})`;
        } else {
            document.body.style.backgroundImage = `url(${defaultBg})`;
        }

        document.body.style.backgroundSize = "cover";
    };
    </script>
</body>
</html>
