    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        function selectIssue(type) {
            let category = "";
            let description = "";
            if (type === 'natural') {
                category = "Nature Issue";
                description = "Public Services";
            } else if (type === 'private') {
                category = "Private Issue";
                description = "Private Services";
            } else if (type === 'culture') {
                category = "Culture Issue";
                description = "BsMembers";
            }
            
            alert(`You are facing an issue with our ${description}!\n\nWe will now redirect you to the instagram page. Describe the issue you experiencing.`);
        }
    </script>
</body>
