round: rgb(0 0 0 / 17%); backdrop-filter: blur(20px); border-radius: 40px; box-shadow: 0 0px 40px rgb(0 0 0 / 60%); overflow: hidden; position: relative; border: 0.5px solid rgba(255, 255, 255, 0.1); } /* Header like macOS */ .header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255, 255, 255, 0.08); position: sticky; top: 0; z-index: 100; background: rgb(0 0 0 / 55%); backdrop-filter: blur(30px); } .header-left { display: flex; align-items: center; gap: 12px; } .header-left img { width: 42px; } .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; } /* Search Bar */ .search-container { position: relative; margin: 0 auto; display: flex; justify-content: center; align-items: center; gap: 3px; border: 0.5px solid rgba(255, 255, 255, 0.1); background: rgb(255 255 255 / 10%); padding: 7px 12px; border-radius: 9999px; width: 180px; } .search-bar { background: transparent; border: none; outline: none; font-size: 18px; color: white; max-width: 400px; width: 150px; } .search-icon { width: 100%; padding: 10px 16px 10px 42px; border-radius: 999px; color: white; font-size: 15px; outline: none; background: transparent; border: none; } /* Toolbar / Categories */ .toolbar { display: flex; padding: 12px 24px; gap: 8px;display: none; overflow-x: auto; scrollbar-width: none; background: rgba(255,255,255,0.03); } .category-btn { padding: 6px 14px; background: rgba(255,255,255,0.1); border: none; border-radius: 9999px; color: white; font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: all 0.2s ease; } .category-btn.active, .category-btn:hover { background: white; color: black; } .websites-container { padding: 20px 5px; display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; justify-items: center; max-height: 300px; overflow-y: scroll; height: fit-content; scrollbar-width: none; } .website-card { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 80px; cursor: pointer; transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); } .icon-wrapper { width: 60px; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; background: linear-gradient(45deg, #000000c9, #25252587); border-top: 1px solid #ffffff47; border-bottom:1px solid #ffffff47; } .website-card img { width: 45px; height: 45px; border-radius: 10px; object-fit: contain; } .website-title { font-size: 13px; font-weight: 500; text-align: center; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #f1f1f1; } .delete-btn { position: absolute; top: 4px; right: 4px; background: red; color: white; width: 22px; height: 22px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; border: none; opacity: 0; transition: all 0.2s ease; } .website-card:hover .delete-btn { display: flex; opacity: 1; } .empty-message { grid-column: 1 / -1; text-align: center; color: rgba(255, 255, 255, 0.5); font-size: 17px; padding: 60px 20px; } .add-btn { width: 40px; height: 40px; background: blue; color: white; border: none; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; transition: transform 0.3s ease; } /* Traffic lights */ .traffic-lights { display: flex; gap: 8px; } .light { width: 12px; height: 12px; border-radius: 50%; } .close { background: #ff5f57; } .minimize { background: #ffbd2e; } .maximize { background: #28c840; } @media (max-width: 480px) { .websites-container { padding: 20px 5px; display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 20px; justify-items: center; max-height: 500px; overflow-y: scroll; height: fit-content; scrollbar-width: none; } .website-card { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 75px; cursor: pointer; transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); } .icon-wrapper { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; background: linear-gradient(45deg, #000000c9, #25252587); border-top: 1px solid #ffffff47; border-bottom: 1px solid #ffffff47; padding: 5px; } .website-card img { width: 40px; height: 40px; border-radius: 12px; object-fit: contain; } } </style> </head> <body> <div class="blur-background" id="blurBg"></div> <div class="background-container" id="bgContainer"></div> <div class="app-container"> <!-- macOS-style header --> <div class="header"> <div class="header-left"> <a href="https://blackswan19.github.io/bscrop/bsearchin" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; justify-content: center;"> <img src="search_in_logo.png" alt="Logo"> </a> </div> <div class="search-container"> <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M380.77-335.39q-102.46 0-173.54-71.07-71.07-71.08-71.07-173.54t71.07-173.54q71.08-71.07 173.54-71.07t173.54 71.07q71.07 71.08 71.07 173.54 0 42.85-14.38 81.85-14.39 39-38.39 67.84l230.16 230.16q8.31 8.3 8.5 20.88.19 12.58-8.5 21.27t-21.08 8.69q-12.38 0-21.07-8.69L530.46-388.16q-30 24.77-69 38.77-39 14-80.69 14Zm0-59.99q77.31 0 130.96-53.66 53.66-53.65 53.66-130.96t-53.66-130.96q-53.65-53.66-130.96-53.66t-130.96 53.66Q196.15-657.31 196.15-580t53.66 130.96q53.65 53.66 130.96 53.66Z"/></svg> <input type="text" id="search-input" class="search-bar" placeholder="Search..." autocomplete="off"> </div> <button class="add-btn" id="add-website-btn"> <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M458.62-148.63Q450-157.25 450-170v-280H170q-12.75 0-21.37-8.63-8.63-8.63-8.63-21.38 0-12.76 8.63-21.37Q157.25-510 170-510h280v-280q0-12.75 8.63-21.37 8.63-8.63 21.38-8.63 12.76 0 21.37 8.63Q510-802.75 510-790v280h280q12.75 0 21.37 8.63 8.63 8.63 8.63 21.38 0 12.76-8.63 21.37Q802.75-450 790-450H510v280q0 12.75-8.63 21.37-8.63 8.63-21.38 8.63-12.76 0-21.37-8.63Z"/></svg> </button> </div> <!-- Categories --> <div class="toolbar" id="categories"> <button class="category-btn active" data-category="all">All</button> <!-- You can add more categories dynamically if needed --> </div> <!-- Grid --> <div class="websites-container" id="websites-container"></div> </div>
<script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        function loadBackground() {
            const storedImage = localStorage.getItem('backgroundImage');
            if (storedImage) {
                document.getElementById('bgContainer').style.backgroundImage = `url('${storedImage}')`;
                document.getElementById('blurBg').style.backgroundImage = `url('${storedImage}')`;
            }
            const savedColor = localStorage.getItem('bgColor');
            if (savedColor) document.body.style.backgroundColor = savedColor;
        }

        function getDomain(url) {
            try {
                return new URL(url).hostname.replace('www.', '');
            } catch (e) {
                return url;
            }
        }

        function loadWebsites(filter = '') {
            const container = document.getElementById('websites-container');
            container.innerHTML = '';

            let savedWebsites = JSON.parse(localStorage.getItem('websites') || '[]');

            if (filter) {
                const term = filter.toLowerCase();
                savedWebsites = savedWebsites.filter(site => 
                    (site.title && site.title.toLowerCase().includes(term)) || 
                    site.url.toLowerCase().includes(term)
                );
            }

            if (savedWebsites.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-message';
                empty.textContent = filter ? 'No matching websites found.' : 'No websites saved yet.';
                container.appendChild(empty);
                return;
            }

            savedWebsites.forEach((website, index) => {
                const card = document.createElement('div');
                card.className = 'website-card';
                card.onclick = () => window.open(website.url, '_self');

                const iconWrapper = document.createElement('div');
                iconWrapper.className = 'icon-wrapper';

                const favicon = document.createElement('img');
                const domain = getDomain(website.url);
                favicon.src = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
                favicon.onerror = () => {
                    favicon.src = 'https://i.ibb.co/kxgjrZG/sitesaved-BS.png';
                };

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-437.85 277.08-234.92q-8.31 8.3-20.89 8.5-12.57.19-21.27-8.5-8.69-8.7-8.69-21.08 0-12.38 8.69-21.08L437.85-480 234.92-682.92q-8.3-8.31-8.5-20.89-.19-12.57 8.5-21.27 8.7-8.69 21.08-8.69 12.38 0 21.08 8.69L480-522.15l202.92-202.93q8.31-8.3 20.89-8.5 12.57-.19 21.27 8.5 8.69 8.7 8.69 21.08 0 12.38-8.69 21.08L522.15-480l202.93 202.92q8.3 8.31 8.5 20.89.19 12.57-8.5 21.27-8.7 8.69-21.08 8.69-12.38 0-21.08-8.69L480-437.85Z"/></svg>';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (confirm(`Delete "${website.title || domain}"?`)) {
                        deleteWebsite(index);
                    }
                };

                iconWrapper.appendChild(favicon);
                iconWrapper.appendChild(deleteBtn);

                const title = document.createElement('div');
                title.className = 'website-title';
                title.textContent = website.title || domain;

                card.appendChild(iconWrapper);
                card.appendChild(title);
                container.appendChild(card);
            });
        }

        function deleteWebsite(index) {
            let savedWebsites = JSON.parse(localStorage.getItem('websites') || '[]');
            savedWebsites.splice(index, 1);
            localStorage.setItem('websites', JSON.stringify(savedWebsites));
            loadWebsites(document.getElementById('search-input').value);
        }

        async function saveWebsite(url) {
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            let title = prompt("Enter a title for this website:");
            if (!title || title.trim() === '') {
                title = getDomain(url);
            }

            let savedWebsites = JSON.parse(localStorage.getItem('websites') || '[]');
            savedWebsites.push({ url, title: title.trim() });
            localStorage.setItem('websites', JSON.stringify(savedWebsites));
            loadWebsites(document.getElementById('search-input').value);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadBackground();
            loadWebsites();

            // Search functionality
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                loadWebsites(e.target.value.trim());
            });

            // Add button
            document.getElementById('add-website-btn').addEventListener('click', () => {
                const url = prompt("Enter website URL:");
                if (url && url.trim() !== '') {
                    saveWebsite(url.trim());
                }
            });

            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.getElementById('search-input') !== document.activeElement) {
                    e.preventDefault();
                    document.getElementById('search-input').focus();
                }
            });

            // Sync across tabs
            window.addEventListener('storage', (e) => {
                if (e.key === 'websites') loadWebsites(searchInput.value);
            });
        });
    </script>
</body>
</html>
